<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>City Walker - v1.8.1</title>
<link href="https://fonts.googleapis.com/css2?family=Poly&display=swap" rel="stylesheet">
<style>
:root {
  --bg-warm: #F9F7F2;
  --text-main: #333333;
  --text-soft: #7D7D7D;
  --accent-positive: #8FB9A8;
  --accent-warm: #FEAD89;
  --border-light: #EEEEEE;
  --white: #FFFFFF;
  --accent-pin: #FFD700;
  --status-idle:     #F9F7F2;
  --status-locating: #FFF3CD;
  --status-walking:  #D4EDDA;
  --status-paused:   #FFE5CC;
  --status-ended:    #E2E8F0;
}
body {
  margin: 0; padding: 0;
  font-family: 'Poly', 'Microsoft JhengHei', sans-serif;
  background: var(--bg-warm); color: var(--text-main);
  overflow: hidden; width: 100vw; height: 100vh;
}
.hidden { display: none !important; }
.page {
  height: 100vh; width: 100%;
  position: absolute; top: 0; left: 0;
  overflow-y: auto; padding-bottom: 120px;
  box-sizing: border-box; z-index: 10;
}
#page-main { z-index: 20; overflow: hidden; }
#page-list { z-index: 25; background: var(--bg-warm); padding-top: 60px; }
#statusBar {
  position: fixed; top: 0; width: 100%; height: 50px;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: bold;
  background: var(--status-idle); backdrop-filter: blur(5px);
  z-index: 1000; border-bottom: 1px solid var(--border-light);
  transition: background-color 0.5s ease; letter-spacing: 1px;
}
#map { height: 100vh; width: 100%; background: #e5e3df; }
.map-controls {
  position: fixed; right: 20px; bottom: 210px;
  display: flex; flex-direction: column; gap: 12px; z-index: 1200;
}
.map-btn {
  width: 50px; height: 50px; background: var(--white); border-radius: 50%;
  box-shadow: 0 4px 15px rgba(0,0,0,0.1);
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; cursor: pointer; border: none;
}
#functionPanel {
  position: fixed; bottom: 95px;
  left: 50%; transform: translateX(-50%);
  width: 85%; max-width: 400px;
  background: var(--white); border-radius: 24px; padding: 20px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.08);
  z-index: 1500; text-align: center;
}
#recordsContainer { width: 92%; max-width: 450px; margin: 0 auto; }
.record-card {
  background: var(--white); margin: 15px 0; padding: 22px;
  border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);
  position: relative; border-left: 6px solid var(--accent-positive);
  cursor: pointer; display: block; box-sizing: border-box; text-align: left;
}
.record-card.is-pinned { border-left-color: var(--accent-pin); background: #FFFDF5; }
.pin-icon { position: absolute; top: 18px; right: 18px; cursor: pointer; font-size: 22px; opacity: 0.3; }
.delete-btn { position: absolute; bottom: 18px; right: 18px; cursor: pointer; font-size: 18px; opacity: 0.3; }
#navBar {
  position: fixed; bottom: 0; width: 100%; height: 75px;
  background: var(--white); display: flex;
  border-top: 1px solid var(--border-light);
  z-index: 2000; padding-bottom: env(safe-area-inset-bottom);
}
.nav-item {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  font-size: 11px; color: var(--text-soft); cursor: pointer;
}
.nav-item.active { color: var(--text-main); font-weight: bold; }
.btn-base {
  padding: 16px 24px; font-size: 15px; font-weight: bold;
  border: none; border-radius: 14px; cursor: pointer; width: 100%; outline: none;
}
.btn-main { background: var(--text-main); color: var(--white); }
.btn-event { background: var(--accent-positive); color: var(--white); }

#eventModal, #saveModal, #memoryBox {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.5);
  display: none; align-items: center; justify-content: center;
  z-index: 9999;
}

/* ===================================================
   [修復 v1.8.1] modal-content
   PSEUDO: 原本 padding:25px 在小螢幕上擠壓 icon grid
   改為左右 padding 縮小到 16px，給 grid 更多橫向空間
   同時加 max-height + overflow-y 避免內容超出螢幕
   =================================================== */
.modal-content {
  background: var(--white);
  width: 92%;           /* 略微加寬 */
  max-width: 400px;
  border-radius: 28px;
  padding: 20px 16px;   /* 左右從 25px 縮到 16px */
  box-sizing: border-box;
  max-height: 90vh;     /* 防止超出螢幕高度 */
  overflow-y: auto;
}

#memoryCloseBtn {
  position: absolute; top: 16px; right: 16px;
  font-size: 22px; color: var(--text-soft);
  cursor: pointer; padding: 4px 8px; border-radius: 50%;
  transition: background 0.2s;
}
#memoryCloseBtn:active { background: var(--bg-warm); }
.event-marker-div {
  position: absolute; font-size: 28px; cursor: pointer;
  transform: translate(-50%, -50%);
  user-select: none; -webkit-user-select: none;
  pointer-events: auto; z-index: 999;
}

/* 色彩色盤 */
#colorPicker {
  position: fixed; top: 62px; left: 16px;
  z-index: 1300;
  display: flex; flex-direction: column; align-items: flex-start; gap: 8px;
}
#colorToggleBtn {
  width: 38px; height: 38px; border-radius: 50%;
  border: 3px solid var(--white);
  box-shadow: 0 2px 8px rgba(0,0,0,0.18);
  cursor: pointer; transition: transform 0.2s;
}
#colorToggleBtn:active { transform: scale(0.92); }
#colorOptions {
  display: none; flex-direction: column; gap: 8px;
  background: var(--white); border-radius: 20px;
  padding: 10px; box-shadow: 0 4px 20px rgba(0,0,0,0.12);
}
#colorOptions.open { display: flex; }
.color-dot {
  width: 34px; height: 34px; border-radius: 50%;
  cursor: pointer; border: 3px solid transparent;
  box-shadow: 0 2px 6px rgba(0,0,0,0.15);
  transition: transform 0.15s, border-color 0.15s; flex-shrink: 0;
}
.color-dot:active { transform: scale(0.88); }
.color-dot.selected {
  border-color: var(--white); transform: scale(1.18);
  box-shadow: 0 3px 10px rgba(0,0,0,0.25);
}

/* Icon 選擇器 */
#iconPickerSection { margin: 10px 0; }
#iconCategoryTabs {
  display: flex; gap: 6px; overflow-x: auto; padding-bottom: 8px;
  scrollbar-width: none; -ms-overflow-style: none;
}
#iconCategoryTabs::-webkit-scrollbar { display: none; }
.icon-tab {
  flex-shrink: 0; padding: 5px 10px; border-radius: 20px;
  font-size: 11px; background: var(--bg-warm); color: var(--text-soft);
  cursor: pointer; border: 1.5px solid transparent;
  transition: all 0.2s; white-space: nowrap;
}
.icon-tab.active {
  background: var(--white); color: var(--text-main);
  border-color: var(--accent-positive); font-weight: bold;
}

/* ===================================================
   [修復 v1.8.1] Icon Grid
   PSEUDO: Bug 1 根本原因
   原本 font-size:24px + padding:5px，在 92% 寬的 modal 裡
   5 欄合計寬度超過容器，第五欄被擠出去
   
   修法：
   - 用 grid-template-columns: repeat(5, 1fr) 讓每欄自動等寬
   - font-size 縮到 22px
   - padding 改成 4px
   - aspect-ratio:1 確保每格是正方形
   關鍵：不設固定寬度，讓 grid 自己分配
   =================================================== */
#iconGrid {
  display: grid;
  grid-template-columns: repeat(5, 1fr); /* 5 欄等寬，自動分配 */
  gap: 4px;
  max-height: 130px;
  overflow-y: auto;
  padding: 2px 0;
}
.icon-cell {
  display: flex; align-items: center; justify-content: center;
  font-size: 22px;  /* 從 24px 縮小 */
  padding: 4px;     /* 從 5px 縮小 */
  border-radius: 10px;
  cursor: pointer; border: 2px solid transparent;
  transition: background 0.15s; aspect-ratio: 1;
  min-width: 0;     /* 防止 grid item 撐開超出欄寬 */
}
.icon-cell:active { transform: scale(0.88); }
.icon-cell.selected { background: var(--bg-warm); border-color: var(--accent-positive); }
#selectedIconPreview { font-size: 26px; margin-left: auto; flex-shrink: 0; }

/* 地標選擇區 */
#placeSection { margin: 8px 0 10px; }
#placeLabel { font-size: 11px; color: var(--text-soft); margin-bottom: 6px; }
#placeTags {
  display: flex; flex-wrap: wrap; gap: 6px;
  min-height: 32px; align-items: center;
}
.place-tag {
  display: flex; align-items: center; gap: 4px;
  padding: 5px 10px; border-radius: 20px;
  font-size: 12px; background: var(--bg-warm); color: var(--text-main);
  border: 1.5px solid var(--border-light);
  cursor: pointer; transition: all 0.2s; white-space: nowrap;
}
.place-tag:active { transform: scale(0.95); }
.place-tag.selected {
  background: #EEF6F3; border-color: var(--accent-positive);
  color: var(--accent-positive); font-weight: bold;
}
.place-detecting { font-size: 12px; color: var(--text-soft); font-style: italic; }
</style>

<body>

<div id="statusBar">City Walker</div>

<div id="colorPicker">
  <div id="colorToggleBtn" onclick="toggleColorPicker()"></div>
  <div id="colorOptions">
    <div class="color-dot selected" style="background:#333333;" data-color="#333333" onclick="selectColor(this)"></div>
    <div class="color-dot" style="background:#FF6B6B;" data-color="#FF6B6B" onclick="selectColor(this)"></div>

    <div class="color-dot" style="background:#5BA4CF;" data-color="#5BA4CF" onclick="selectColor(this)"></div>

<div class="map-controls">

<div id="eventModal">

    <div id="placeSection">
      <div id="placeLabel">📍 附近地標</div>

        <span class="place-detecting">偵測中...</span>

    <textarea id="eventText" placeholder="寫下心情..." maxlength="100"

    <div id="iconPickerSection">
      <div style="display:flex; align-items:center; margin-bottom:8px;">

<div id="page-list" class="page hidden">

<nav id="navBar">
  <div class="nav-item active" id="nav-main" onclick="switchPage('main')">📍<span>漫遊</span></div>
  <div class="nav-item" id="nav-list" onclick="switchPage('list')">📜<span>紀錄</span></div>
</nav>


<script>
var map, marker, pathLine, watchId, geocoder, placesService;
var walkPath = [], eventsData = [], totalDistance = 0;
var startTime, durationStr, cityName = '未知城市', selectedIcon = '📸';
var historyMarkers = [];
var locatingTimer = null;
var selectedTrackColor = '#333333';
var rawGpsBuffer = [];
var ROADS_API_KEY = 'AIzaSyD-7BNyEDGdFlK_-gyFlAN86r0ECjO3z40';
var pauseWindowPoints = [], pauseWindowStart = null;
var nearbyPlaces = [], selectedPlace = null;

var ICON_CATEGORIES = [
  { name: '美食', emoji: '🍽️', icons: ['☕','🍔','🍜','🍣','🧁','🍺','🧃','🍦','🥐','🍱'] },
  { name: '自然', emoji: '🌿', icons: ['🌸','🌳','🌊','🌙','☀️','🌧️','🍂','🌈','🏔️','🌺'] },
  { name: '地點', emoji: '📍', icons: ['🏛️','🏪','🚉','🌉','🏠','🎭','🏟️','⛩️','🗼','🛣️'] },
  { name: '心情', emoji: '💭', icons: ['✨','❤️','😊','🥹','😮','💡','🤔','😴','🥰','🎉'] },
  { name: '活動', emoji: '🎯', icons: ['📸','🎵','🛍️','📖','🎨','🏃','🚲','⚽','🎮','🎤'] },
  { name: '特別', emoji: '⭐', icons: ['⭐','🏆','💎','🎁','🔖','📌','🗓️','💫','🕐','🎊'] }
];

function buildIconPicker() {
  var tabContainer = document.getElementById('iconCategoryTabs');
  tabContainer.innerHTML = '';
  ICON_CATEGORIES.forEach(function(cat, idx) {
    var tab = document.createElement('div');
    tab.className = 'icon-tab' + (idx === 0 ? ' active' : '');
    tab.innerText = cat.emoji + ' ' + cat.name;
    tab.onclick = function() { switchIconCategory(idx); };
    tabContainer.appendChild(tab);
  });
  renderIconGrid(0);
}

function switchIconCategory(idx) {
  document.querySelectorAll('.icon-tab').forEach(function(tab, i) {
    tab.classList.toggle('active', i === idx);
  });
  renderIconGrid(idx);
}

function renderIconGrid(idx) {
  var grid = document.getElementById('iconGrid');
  grid.innerHTML = '';
  ICON_CATEGORIES[idx].icons.forEach(function(emoji) {
    var cell = document.createElement('div');
    cell.className = 'icon-cell' + (emoji === selectedIcon ? ' selected' : '');
    cell.innerText = emoji;
    cell.onclick = function() {
      selectedIcon = emoji;
      document.querySelectorAll('.icon-cell').forEach(function(c) { c.classList.remove('selected'); });
      cell.classList.add('selected');
      document.getElementById('selectedIconPreview').innerText = emoji;
    };
    grid.appendChild(cell);
  });
}

var ENCOURAGE_LIST = [
  '每一步都是在和這座城市說你好。','你走過的路，都成為了你的一部分。',
  '不趕時間的移動，才看得見風景。','今天的漫遊，是送給未來的你的禮物。',
  '走路是最誠實的旅行方式。','迷路也是一種探索。',
  '城市的故事，藏在你停下來的每個瞬間。','腳步慢下來，世界就大了起來。',
  '你不是在趕路，你是在收集記憶。','走著走著，就找到了答案。',
  '每條路都值得被好好走過。','今天的你，多認識了一點這座城市。',
  '散步是一種溫柔的勇氣。','你的足跡，是這座城市最好的地圖。',
  '好好走路，是對自己最好的陪伴。','慢慢走，什麼都會來的。',
  '城市不大，只要你願意用腳丈量。','今天走過的路，明天會變成想念。',
  '每次 City Walk，都是一次小小的冒險。','謝謝你今天也好好走路了。'
];
function getDailyEncouragement() {
  var today = new Date();
  var seed = today.getFullYear() * 10000 + (today.getMonth() + 1) * 100 + today.getDate();
  return ENCOURAGE_LIST[seed % ENCOURAGE_LIST.length];
}

function setStatusBar(text, bgColor) {
  var bar = document.getElementById('statusBar');
  bar.innerText = text;
  bar.style.backgroundColor = bgColor || 'var(--status-idle)';
}
function closeMemoryBox() { document.getElementById('memoryBox').style.display = 'none'; }
function toggleColorPicker() { document.getElementById('colorOptions').classList.toggle('open'); }
function selectColor(el) {
  selectedTrackColor = el.getAttribute('data-color');
  document.getElementById('colorToggleBtn').style.backgroundColor = selectedTrackColor;
  document.querySelectorAll('.color-dot').forEach(function(d) { d.classList.remove('selected'); });
  el.classList.add('selected');
  if (pathLine) pathLine.setOptions({ strokeColor: selectedTrackColor });
  document.getElementById('colorOptions').classList.remove('open');
}
document.addEventListener('click', function(e) {
  var picker = document.getElementById('colorPicker');
  if (picker && !picker.contains(e.target)) document.getElementById('colorOptions').classList.remove('open');
});

function initMap() {
  map = new google.maps.Map(document.getElementById('map'), {
    zoom: 17, center: { lat: 25.0478, lng: 121.5170 },
    disableDefaultUI: true,
    styles: [{ featureType: 'poi', stylers: [{ visibility: 'off' }] }]
  });
  marker = new google.maps.Marker({
    map, label: { text: '👣', fontSize: '30px' },
    icon: { path: google.maps.SymbolPath.CIRCLE, scale: 0 }, zIndex: 999
  });
  pathLine = new google.maps.Polyline({
    map, strokeColor: selectedTrackColor, strokeWeight: 6, strokeOpacity: 0.85
  });
  geocoder = new google.maps.Geocoder();
  placesService = new google.maps.places.PlacesService(map);
  document.getElementById('colorToggleBtn').style.backgroundColor = selectedTrackColor;
  buildIconPicker();

  setStatusBar('📡 取得位置中...', 'var(--status-locating)');
  navigator.geolocation.getCurrentPosition(
    function(pos) {
      var userPos = { lat: pos.coords.latitude, lng: pos.coords.longitude };
      map.setCenter(userPos); marker.setPosition(userPos);
      setStatusBar('City Walker', 'var(--status-idle)');
    },
    function() { setStatusBar('City Walker', 'var(--status-idle)'); },
    { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
  );
}

function focusOnMe() {
  navigator.geolocation.getCurrentPosition(
    function(pos) {
      var userPos = { lat: pos.coords.latitude, lng: pos.coords.longitude };
      marker.setPosition(userPos); map.panTo(userPos);
    },
    function() { if (marker && marker.getPosition()) map.panTo(marker.getPosition()); },
    { enableHighAccuracy: true, timeout: 8000, maximumAge: 3000 }
  );
}
function focusOnRouteStart() {
  var p = pathLine.getPath().getArray();
  if (p.length > 0) map.panTo(p[0]);
}

async function snapToRoads(points) {
  if (!points || points.length === 0) return;
  var pathStr = points.map(function(p) { return p.lat + ',' + p.lng; }).join('|');
  try {
    var res = await fetch(
      'https://roads.googleapis.com/v1/snapToRoads?path=' +
      encodeURIComponent(pathStr) + '&interpolate=true&key=' + ROADS_API_KEY
    );
    var data = await res.json();
    if (data.snappedPoints && data.snappedPoints.length > 0) {
      data.snappedPoints.forEach(function(sp) {
        walkPath.push({ lat: sp.location.latitude, lng: sp.location.longitude });
      });
      pathLine.setPath(walkPath);
      var last = walkPath[walkPath.length - 1];
      marker.setPosition(last); map.panTo(last);
    }
  } catch (err) {
    console.warn('[Roads API] fallback:', err);
    points.forEach(function(p) { walkPath.push(p); });
    pathLine.setPath(walkPath);
  }
}
async function flushRawBuffer() {
  if (rawGpsBuffer.length > 0) {
    var remaining = rawGpsBuffer.slice(); rawGpsBuffer = [];
    await snapToRoads(remaining);
  }
}

function startWalk() {
  startTime = new Date();
  document.getElementById('state-init').classList.add('hidden');
  document.getElementById('state-recording').classList.remove('hidden');
  setStatusBar('📡 取得定位狀態中', 'var(--status-locating)');
  document.getElementById('colorPicker').style.display = 'none';
  pathLine.setOptions({ strokeColor: selectedTrackColor, strokeOpacity: 0.85 });
  pauseWindowPoints = []; pauseWindowStart = new Date();

  locatingTimer = setTimeout(function() {
    navigator.geolocation.clearWatch(watchId);
    setStatusBar('⚠️ 定位失敗', 'var(--status-ended)');
    document.getElementById('state-recording').classList.add('hidden');
    document.getElementById('state-finished').classList.remove('hidden');
    document.getElementById('summaryBox').innerHTML =
      '<div style="text-align:center;color:var(--text-soft);padding:10px;">📡 請確認定位狀態後重新開始</div>';
  }, 60000);

  watchId = navigator.geolocation.watchPosition(function(pos) {
    var newPoint = { lat: pos.coords.latitude, lng: pos.coords.longitude };
    if (pos.coords.accuracy > 40) return;
    var lastRaw = rawGpsBuffer.length > 0
      ? rawGpsBuffer[rawGpsBuffer.length - 1]
      : (walkPath.length > 0 ? walkPath[walkPath.length - 1] : null);
    if (lastRaw) {
      var dist = google.maps.geometry.spherical.computeDistanceBetween(
        new google.maps.LatLng(lastRaw.lat, lastRaw.lng),
        new google.maps.LatLng(newPoint.lat, newPoint.lng)
      );
      if (dist < 3 || dist > 80) return;
    }
    if (locatingTimer) { clearTimeout(locatingTimer); locatingTimer = null; }
    rawGpsBuffer.push(newPoint);
    marker.setPosition(newPoint);
    if (rawGpsBuffer.length >= 5) {
      var batch = rawGpsBuffer.slice(); rawGpsBuffer = [];
      snapToRoads(batch);
    }
    var now = new Date();
    pauseWindowPoints.push({ point: newPoint, time: now });
    pauseWindowPoints = pauseWindowPoints.filter(function(item) { return (now - item.time) <= 15000; });
    var windowDist = 0;
    if (pauseWindowPoints.length >= 2) {
      var first = pauseWindowPoints[0].point;
      var last = pauseWindowPoints[pauseWindowPoints.length - 1].point;
      windowDist = google.maps.geometry.spherical.computeDistanceBetween(
        new google.maps.LatLng(first.lat, first.lng),
        new google.maps.LatLng(last.lat, last.lng)
      );
    }
    var currentKm = walkPath.length > 1
      ? google.maps.geometry.spherical.computeLength(pathLine.getPath()) / 1000 : 0;
    if (windowDist > 7) {
      setStatusBar('🚶 漫步中・' + currentKm.toFixed(2) + ' km', 'var(--status-walking)');
      pauseWindowPoints = [{ point: newPoint, time: now }]; pauseWindowStart = now;
    } else if ((now - pauseWindowStart) >= 15000) {
      setStatusBar('☕ 暫停一下...', 'var(--status-paused)');
    } else if (currentKm > 0) {
      setStatusBar('🚶 漫步中・' + currentKm.toFixed(2) + ' km', 'var(--status-walking)');
    }
  }, function(err) {
    console.error('[GPS錯誤]', err);
    setStatusBar('📡 取得定位狀態中', 'var(--status-locating)');
  }, { enableHighAccuracy: true, maximumAge: 0, timeout: 10000 });
}


/* ===================================================
   [修復 v1.8.1] openEventCanvas() - nearbySearch
   
   PSEUDO: Bug 2 根本原因
   nearbySearch 回傳的結果裡，某些 place 物件的
   geometry 欄位可能是 undefined（例如商家暫時關閉
   或資料不完整的地點）
   
   原本：直接呼叫 place.geometry.location.lat()
   → 若 geometry 為 undefined 就爆 TypeError
   → callback 整個中斷，UI 卡在「偵測中」
   
   修法：加入 null 檢查，過濾掉沒有 geometry 的結果
   只保留有完整座標的地標才建立 tag
   =================================================== */
function openEventCanvas() {
  document.getElementById('eventModal').style.display = 'flex';
  selectedPlace = null;
  nearbyPlaces = [];
  document.getElementById('placeTags').innerHTML = '<span class="place-detecting">偵測中...</span>';
  switchIconCategory(0);
  document.getElementById('selectedIconPreview').innerText = selectedIcon;

  var currentPos = marker.getPosition();
  if (!currentPos || !placesService) {
    document.getElementById('placeTags').innerHTML = '<span class="place-detecting">（無法取得位置）</span>';
    return;
  }

  placesService.nearbySearch({
    location: currentPos, radius: 80, type: ['establishment']
  }, function(results, status) {
    var tagsContainer = document.getElementById('placeTags');
    tagsContainer.innerHTML = '';

    if (status !== google.maps.places.PlacesServiceStatus.OK || !results || results.length === 0) {
      tagsContainer.innerHTML = '<span class="place-detecting">（附近無地標）</span>';
      return;
    }

    /* ===================================================
       [修復 v1.8.1] 過濾沒有 geometry 的結果
       PSEUDO: 只保留有 geometry.location 的地標
       避免 .lat() 呼叫爆 TypeError
       =================================================== */
    var validResults = results.filter(function(place) {
      return place.geometry && place.geometry.location;
    });

    if (validResults.length === 0) {
      tagsContainer.innerHTML = '<span class="place-detecting">（附近無地標）</span>';
      return;
    }

    var topResults = validResults.slice(0, 3);
    topResults.forEach(function(place) {
      var placeData = {
        name: place.name,
        placeId: place.place_id,
        lat: place.geometry.location.lat(),
        lng: place.geometry.location.lng()
      };
      nearbyPlaces.push(placeData);

      var tag = document.createElement('div');
      tag.className = 'place-tag';
      tag.innerText = '📍 ' + place.name;
      tag.onclick = function() {
        if (selectedPlace && selectedPlace.placeId === placeData.placeId) {
          selectedPlace = null;
          tag.classList.remove('selected');
        } else {
          selectedPlace = placeData;
          document.querySelectorAll('.place-tag').forEach(function(t) { t.classList.remove('selected'); });
          tag.classList.add('selected');
        }
      };
      tagsContainer.appendChild(tag);
    });
  });
}

function closeEventModal() {
  selectedPlace = null;
  document.getElementById('eventModal').style.display = 'none';
}

function saveEvent() {
  var text = document.getElementById('eventText').value;
  var eventPos, placeName, placeId;
  if (selectedPlace) {
    eventPos = { lat: selectedPlace.lat, lng: selectedPlace.lng };
    placeName = selectedPlace.name;
    placeId = selectedPlace.placeId;
  } else {
    eventPos = marker.getPosition().toJSON();
    placeName = ''; placeId = '';
  }
  eventsData.push({ text: text, icon: selectedIcon, pos: eventPos, placeName: placeName, placeId: placeId });
  createEventMarker(eventPos, selectedIcon, text, placeName);
  document.getElementById('eventText').value = '';
  selectedPlace = null;
  document.getElementById('eventModal').style.display = 'none';
}

async function endWalk() {
  navigator.geolocation.clearWatch(watchId);
  if (locatingTimer) { clearTimeout(locatingTimer); locatingTimer = null; }
  setStatusBar('✅ 漫遊結束', 'var(--status-ended)');
  document.getElementById('state-recording').classList.add('hidden');
  document.getElementById('state-finished').classList.remove('hidden');
  document.getElementById('encourageBox').innerText = '「' + getDailyEncouragement() + '」';
  await flushRawBuffer();
  totalDistance = walkPath.length > 1
    ? google.maps.geometry.spherical.computeLength(pathLine.getPath()) / 1000 : 0;
  durationStr = Math.floor(Math.abs(new Date() - startTime) / 60000) + ' 分鐘';
  if (walkPath.length > 0) {
    geocoder.geocode({ location: walkPath[walkPath.length - 1] }, function(results, status) {
      if (status === 'OK' && results[0]) {
        var cityObj = results[0].address_components.find(function(c) {
          return c.types.includes('administrative_area_level_1') || c.types.includes('locality');
        });
        cityName = cityObj ? cityObj.long_name : '未知城市';
        document.getElementById('summaryBox').innerHTML =
          '<strong>漫遊結算</strong><br>' +
          '🏙️ 城市：' + cityName + '<br>' +
          '👣 里程：' + totalDistance.toFixed(2) + ' KM<br>' +
          '⏱️ 時長：' + durationStr + '<br>' +
          '📸 事件：' + eventsData.length + ' 個';
      }
    });
  }
}

async function executeCloudSave() {
  var btn = document.getElementById('btnConfirmSave');
  if (btn) btn.disabled = true;
  try {
    await window.api.addDoc(window.api.collection(window.db, 'walk_records'), {
      name: document.getElementById('routeName').value || '未命名漫遊',
      city: cityName, distance: totalDistance, duration: durationStr,
      path: walkPath, events: eventsData,
      trackColor: selectedTrackColor, isPinned: false,
      createdAt: window.api.serverTimestamp()
    });
    location.reload();
  } catch (e) {
    alert('儲存失敗');
    if (btn) btn.disabled = false;
  }
}

function createEventMarker(pos, icon, text, placeName) {
  function EmojiOverlay(position, icon, text, placeName) {
    this.position_ = new google.maps.LatLng(position.lat, position.lng);
    this.icon_ = icon; this.text_ = text; this.placeName_ = placeName || '';
    this.div_ = null; this.setMap(map);
  }
  EmojiOverlay.prototype = Object.create(google.maps.OverlayView.prototype);
  EmojiOverlay.prototype.onAdd = function() {
    var div = document.createElement('div');
    div.className = 'event-marker-div';
    div.innerText = this.icon_;
    var ci = this.icon_, ct = this.text_, cp = this.placeName_;
    function showMemory(e) {
      e.stopPropagation();
      if (e.preventDefault) e.preventDefault();
      document.getElementById('memoryIcon').innerText = ci || '📸';
      document.getElementById('memoryText').innerText = ct || '那一天，在這裡留下了足跡...';
      document.getElementById('memoryPlace').innerText = cp ? ('📍 ' + cp) : '';
      document.getElementById('memoryBox').style.display = 'flex';
    }
    div.addEventListener('click', showMemory);
    div.addEventListener('touchstart', showMemory, { passive: false });
    this.div_ = div;
    this.getPanes().overlayMouseTarget.appendChild(div);
  };
  EmojiOverlay.prototype.draw = function() {
    var pt = this.getProjection().fromLatLngToDivPixel(this.position_);
    if (this.div_ && pt) { this.div_.style.left = pt.x + 'px'; this.div_.style.top = pt.y + 'px'; }
  };
  EmojiOverlay.prototype.onRemove = function() {
    if (this.div_) { this.div_.parentNode.removeChild(this.div_); this.div_ = null; }
  };
  return new EmojiOverlay(pos, icon, text, placeName);
}

async function fetchRecords() {
  var container = document.getElementById('recordsContainer');
  if (!container) return;
  container.innerHTML = '<p style="text-align:center;padding:20px;">載入中...</p>';
  try {
    var snap = await window.api.getDocs(window.api.collection(window.db, 'walk_records'));
    window.currentDocs = [];
    snap.forEach(function(d) { window.currentDocs.push(Object.assign({ id: d.id }, d.data())); });
    window.currentDocs.sort(function(a, b) {
      return (b.isPinned - a.isPinned) || ((b.createdAt && b.createdAt.seconds || 0) - (a.createdAt && a.createdAt.seconds || 0));
    });
    container.innerHTML = '';
    window.currentDocs.forEach(function(data) {
      var cardColor = data.trackColor || 'var(--accent-positive)';
      var card = document.createElement('div');
      card.className = 'record-card ' + (data.isPinned ? 'is-pinned' : '');
      card.style.borderLeftColor = data.isPinned ? 'var(--accent-pin)' : cardColor;
      card.onclick = function() { loadSavedRoute(data.id); };
      card.innerHTML =
        '<div class="pin-icon" onclick="togglePin(event,\'' + data.id + '\',' + data.isPinned + ')">📌</div>' +
        '<div class="delete-btn" onclick="deleteRecord(event,\'' + data.id + '\')">🗑️</div>' +
        '<div style="font-size:12px;color:var(--text-soft);">' + data.city + '</div>' +
        '<div style="font-size:16px;font-weight:bold;margin:4px 0;">' + data.name + '</div>' +
        '<div style="font-size:13px;color:var(--text-soft);">👣 ' + data.distance.toFixed(2) + ' km &nbsp;⏱️ ' + data.duration + '</div>';
      container.appendChild(card);
    });
  } catch (e) {
    console.error(e);
    container.innerHTML = '<p style="text-align:center;color:red;">載入失敗</p>';
  }
}

function loadSavedRoute(id) {
  var data = window.currentDocs.find(function(d) { return d.id === id; });
  if (!data) return;
  switchPage('main');
  pathLine.setPath([]);
  historyMarkers.forEach(function(m) { m.setMap(null); });
  historyMarkers = [];
  var pts = data.path.map(function(p) { return { lat: p.lat, lng: p.lng }; });
  pathLine.setPath(pts);
  pathLine.setOptions({ strokeColor: data.trackColor || '#FEAD89', strokeOpacity: 0.85, strokeWeight: 6 });
  if (data.events) {
    data.events.forEach(function(ev) {
      historyMarkers.push(createEventMarker(ev.pos, ev.icon, ev.text, ev.placeName || ''));
    });
  }
  map.panTo(pts[0]);
  document.getElementById('btnFocusRoute').classList.remove('hidden');
}

async function deleteRecord(e, id) {
  e.stopPropagation();
  if (!confirm('確定要刪除嗎？')) return;
  await window.api.deleteDoc(window.api.doc(window.db, 'walk_records', id));
  fetchRecords();
}
async function togglePin(e, id, status) {
  e.stopPropagation();
  await window.api.updateDoc(window.api.doc(window.db, 'walk_records', id), { isPinned: !status });
  fetchRecords();
}

function switchPage(p) {
  document.querySelectorAll('.page').forEach(function(page) { page.classList.add('hidden'); });
  document.querySelectorAll('.nav-item').forEach(function(n) { n.classList.remove('active'); });
  var targetPage = document.getElementById('page-' + p);
  var targetNav  = document.getElementById('nav-' + p);
  if (targetPage) targetPage.classList.remove('hidden');
  if (targetNav)  targetNav.classList.add('active');
  var mapControls = document.querySelector('.map-controls');
  var colorPicker = document.getElementById('colorPicker');
  var isInit = !document.getElementById('state-init').classList.contains('hidden');
  if (p === 'list') {
    if (mapControls) mapControls.style.display = 'none';
    if (colorPicker) colorPicker.style.display = 'none';
  } else {
    if (mapControls) mapControls.style.display = 'flex';
    if (colorPicker) colorPicker.style.display = isInit ? 'flex' : 'none';
  }
  if (p === 'list') fetchRecords();
}

function openSaveModal() { document.getElementById('saveModal').style.display = 'flex'; }

window.onload = initMap;
window.focusOnMe = focusOnMe;
window.focusOnRouteStart = focusOnRouteStart;
window.openEventCanvas = openEventCanvas;
window.closeEventModal = closeEventModal;
window.saveEvent = saveEvent;
window.openSaveModal = openSaveModal;
window.executeCloudSave = executeCloudSave;
window.switchPage = switchPage;
window.closeMemoryBox = closeMemoryBox;
window.deleteRecord = deleteRecord;
window.togglePin = togglePin;
window.toggleColorPicker = toggleColorPicker;
window.selectColor = selectColor;
window.endWalk = endWalk;
window.startWalk = startWalk;
</script>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>City Walker - 雲端紀錄版</title>
    <link href="https://fonts.googleapis.com/css2?family=Poly&display=swap" rel="stylesheet">
    <style>
        :root { --bg-warm: #F9F7F2; --text-main: #333333; --text-soft: #7D7D7D; --accent-positive: #8FB9A8; --accent-warm: #FEAD89; --border-light: #EEEEEE; --white: #FFFFFF; }
        body { margin: 0; padding: 0; font-family: 'Poly', 'Microsoft JhengHei', sans-serif; background: var(--bg-warm); color: var(--text-main); overflow: hidden; }
        #statusBar { position: fixed; top: 0; width: 100%; height: 50px; display: flex; align-items: center; justify-content: center; font-size: 13px; letter-spacing: 1.5px; background: rgba(249, 247, 242, 0.9); backdrop-filter: blur(5px); z-index: 1000; }
        .status-searching { color: var(--text-soft); } .status-walking { color: var(--accent-positive); } .status-pausing { color: var(--accent-warm); }
        #map { height: 100vh; width: 100%; z-index: 1; background: #e5e3df; }
        .gm-ui-hover-effect { display: none !important; } .gm-style-iw-c { border-radius: 12px !important; padding: 10px !important; }
        #functionPanel { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%); width: 85%; max-width: 400px; background: var(--white); border-radius: 24px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); z-index: 500; text-align: center; }
        .btn-base { padding: 16px 24px; font-size: 15px; font-weight: bold; border: none; border-radius: 14px; cursor: pointer; transition: 0.3s; width: 100%; margin: 6px 0; outline: none; }
        .btn-main { background: var(--text-main); color: var(--white); }
        .btn-event { background: var(--accent-positive); color: var(--white); }
        .btn-plus { width: 56px; height: 56px; border-radius: 50%; font-size: 24px; background: var(--white); border: 2px solid var(--text-main); color: var(--text-main); display: inline-flex; align-items: center; justify-content: center; margin-bottom: 10px; }
        #eventModal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.3); display: none; align-items: center; justify-content: center; z-index: 2000; }
        .modal-content { background: var(--white); width: 85%; max-width: 350px; border-radius: 28px; padding: 25px; box-shadow: 0 20px 50px rgba(0,0,0,0.15); animation: slideUp 0.4s ease; }
        @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        textarea { width: 100%; height: 80px; border: 1px solid var(--border-light); border-radius: 12px; padding: 12px; font-size: 14px; resize: none; box-sizing: border-box; background: #FAFAFA; margin-top: 10px; }
        .icon-selector { display: flex; justify-content: space-around; margin: 15px 0; font-size: 24px; }
        .icon-item { cursor: pointer; padding: 8px; border-radius: 10px; }
        .icon-item.selected { background: var(--bg-warm); border: 2px solid var(--accent-positive); }
        #navBar { position: fixed; bottom: 0; width: 100%; height: 75px; background: var(--white); display: flex; border-top: 1px solid var(--border-light); z-index: 1000; padding-bottom: env(safe-area-inset-bottom); }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 11px; color: var(--text-soft); }
        .nav-item.active { color: var(--text-main); font-weight: bold; }
        #summaryBox { display: none; margin-top: 15px; text-align: left; font-size: 14px; border-top: 1px solid var(--border-light); padding-top: 15px; }
        .hidden { display: none !important; }
    </style>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDc460QtdfTv32gEPNPLVCMOxPz0hCWxbQ",
            authDomain: "city-walk-project.firebaseapp.com",
            projectId: "city-walk-project",
            storageBucket: "city-walk-project.firebasestorage.app",
            messagingSenderId: "190868537611",
            appId: "1:190868537611:web:9a97031a9357f4d39be20e"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        window.db = db; // 暴露給全域使用
        window.addDoc = addDoc;
        window.collection = collection;
        window.serverTimestamp = serverTimestamp;
    </script>
</head>
<body>

    <div id="statusBar" class="status-searching">等待開啟 City Walk...</div>

    <div id="eventModal">
        <div class="modal-content">
            <div style="font-weight:bold; font-size:18px;">紀錄這一刻</div>
            <textarea id="eventText" placeholder="寫下心情... (至多100字)" maxlength="100"></textarea>
            <div class="icon-selector">
                <div class="icon-item selected" onclick="selectIcon(this, '📸')">📸</div>
                <div class="icon-item" onclick="selectIcon(this, '☕')">☕</div>
                <div class="icon-item" onclick="selectIcon(this, '🌸')">🌸</div>
                <div class="icon-item" onclick="selectIcon(this, '✨')">✨</div>
            </div>
            <div style="display:flex; gap:10px;">
                <button class="btn-base" style="background:#EEE;" onclick="closeEventCanvas()">取消</button>
                <button class="btn-base btn-event" onclick="saveEvent()">確認</button>
            </div>
        </div>
    </div>

    <div id="page-main">
        <div id="map"></div>
        <div id="functionPanel">
            <div id="state-init">
                <button class="btn-base btn-main" onclick="startWalk()">開始 City Walk！</button>
            </div>
            <div id="state-recording" class="hidden">
                <button class="btn-base btn-event" onclick="openEventCanvas()">紀錄事件！</button>
                <button class="btn-base" style="background:#f5f5f5;" onclick="endWalk()">結束本次漫遊</button>
            </div>
            <div id="state-finished" class="hidden">
                <button class="btn-plus" onclick="confirmSave()">+</button>
                <div id="summaryBox"></div>
                <button class="btn-base btn-main" style="margin-top:10px;" onclick="location.reload()">重新開始</button>
            </div>
        </div>
    </div>

    <nav id="navBar">
        <div class="nav-item active" onclick="switchPage('main')">📍<span>漫遊</span></div>
        <div class="nav-item" onclick="switchPage('query')">🌍<span>發現</span></div>
        <div class="nav-item" onclick="switchPage('list')">📜<span>紀錄</span></div>
    </nav>

    <script>
        let map, marker, pathLine, watchId, infoWindow;
        let walkPath = [];
        let eventsData = [];
        let isTracking = false;
        let selectedIcon = '📸';
        let totalDistance = 0;

        function initMap() {
            map = new google.maps.Map(document.getElementById("map"), {
                zoom: 17, center: { lat: 25.0478, lng: 121.5170 },
                disableDefaultUI: true,
                styles: [{ "featureType": "poi", "stylers": [{ "visibility": "off" }] }, { "featureType": "poi.food_and_drink", "stylers": [{ "visibility": "on" }] }]
            });
            marker = new google.maps.Marker({ map, label: "👣", icon: { path: google.maps.SymbolPath.CIRCLE, scale: 0 } });
            pathLine = new google.maps.Polyline({ map, strokeColor: "#333", strokeWeight: 5, strokeOpacity: 0.4 });
            infoWindow = new google.maps.InfoWindow({ content: "I'm Here! ✨" });
            map.addListener("click", () => infoWindow.close());
        }

        function startWalk() {
            document.getElementById('state-init').classList.add('hidden');
            document.getElementById('state-recording').classList.remove('hidden');
            updateStatus("取得定位中...", "walking");
            watchId = navigator.geolocation.watchPosition((pos) => {
                const p = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                walkPath.push(p);
                pathLine.setPath(walkPath);
                marker.setPosition(p);
                map.panTo(p);
                updateStatus("漫步中 —", "walking");
            }, null, { enableHighAccuracy: true });
        }

        function openEventCanvas() { document.getElementById('eventModal').style.display = 'flex'; }
        function closeEventCanvas() { document.getElementById('eventModal').style.display = 'none'; }
        function selectIcon(el, icon) {
            document.querySelectorAll('.icon-item').forEach(i => i.classList.remove('selected'));
            el.classList.add('selected'); selectedIcon = icon;
        }

        function saveEvent() {
            const text = document.getElementById('eventText').value;
            const pos = marker.getPosition().toJSON();
            eventsData.push({ text, icon: selectedIcon, pos });
            new google.maps.Marker({ position: pos, map, label: selectedIcon, icon: { path: google.maps.SymbolPath.CIRCLE, scale: 0 } });
            document.getElementById('eventText').value = "";
            closeEventCanvas();
        }

        function endWalk() {
            navigator.geolocation.clearWatch(watchId);
            document.getElementById('state-recording').classList.add('hidden');
            document.getElementById('state-finished').classList.remove('hidden');
            document.getElementById('summaryBox').style.display = "block";
            totalDistance = google.maps.geometry.spherical.computeLength(pathLine.getPath()) / 1000;
            document.getElementById('summaryBox').innerHTML = `<b>漫遊結束</b><br>里程：${totalDistance.toFixed(2)} KM<br>事件：${eventsData.length} 個`;
        }

        // --- Firebase 儲存核心 ---
        async function confirmSave() {
            if (walkPath.length < 2) { alert("路徑太短，無法儲存喔！"); return; }
            const btn = document.getElementById('btnCreateList');
            try {
                updateStatus("儲存中...", "searching");
                await window.addDoc(window.collection(window.db, "walk_records"), {
                    path: walkPath,
                    distance: totalDistance,
                    events: eventsData,
                    createdAt: window.serverTimestamp()
                });
                alert("存入雲端成功！可以在『紀錄』分頁查看（開發中）。");
                updateStatus("已存入雲端", "walking");
            } catch (e) {
                console.error("儲存失敗: ", e);
                alert("儲存失敗，請檢查資料庫權限。");
            }
        }

        function updateStatus(t, c) { const s = document.getElementById('statusBar'); s.innerText = t; s.className = `status-${c}`; }
        function switchPage(p) { /* 分頁邏輯 */ }
    </script>
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyD-7BNyEDGdFlK_-gyFlAN86r0ECjO3z40&callback=initMap&libraries=geometry,places" async defer></script>
</body>
</html>

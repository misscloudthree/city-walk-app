<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>City Walker - v1.2.0</title>
<link href="https://fonts.googleapis.com/css2?family=Poly&display=swap" rel="stylesheet">
<style>
/* ===================================================
   PSEUDO: 定義全域 CSS 變數（色票）
   讓整個 app 的顏色只需在這裡改一次
   =================================================== */
:root {
  --bg-warm: #F9F7F2;
  --text-main: #333333;
  --text-soft: #7D7D7D;
  --accent-positive: #8FB9A8;
  --accent-warm: #FEAD89;
  --border-light: #EEEEEE;
  --white: #FFFFFF;
  --accent-pin: #FFD700;
}

/* PSEUDO: 全域重置，讓畫面撐滿螢幕，禁止頁面捲動 */
body {
  margin: 0; padding: 0;
  font-family: 'Poly', 'Microsoft JhengHei', sans-serif;
  background: var(--bg-warm); color: var(--text-main);
  overflow: hidden; width: 100vw; height: 100vh;
}

/* PSEUDO: .hidden 用來快速隱藏任何元素 */
.hidden { display: none !important; }

/* PSEUDO: .page 是每個主畫面的容器，全部疊在同一位置
   用 hidden 切換來模擬「換頁」效果 */
.page {
  height: 100vh; width: 100%;
  position: absolute; top: 0; left: 0;
  overflow-y: auto; padding-bottom: 120px;
  box-sizing: border-box; z-index: 10;
}
#page-main { z-index: 20; overflow: hidden; }
#page-list { z-index: 25; background: var(--bg-warm); padding-top: 60px; }

/* PSEUDO: 頂部狀態列，固定在畫面最上方，有毛玻璃效果 */
#statusBar {
  position: fixed; top: 0; width: 100%; height: 50px;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px;
  background: rgba(249, 247, 242, 0.95);
  backdrop-filter: blur(5px);
  z-index: 1000; border-bottom: 1px solid var(--border-light);
}

/* PSEUDO: 地圖佔滿整個視窗 */
#map { height: 100vh; width: 100%; background: #e5e3df; }

/* PSEUDO: 地圖右側浮動控制鈕 */
.map-controls {
  position: fixed; right: 20px; bottom: 210px;
  display: flex; flex-direction: column; gap: 12px; z-index: 1200;
}
.map-btn {
  width: 50px; height: 50px; background: var(--white); border-radius: 50%;
  box-shadow: 0 4px 15px rgba(0,0,0,0.1);
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; cursor: pointer; border: none;
}

/* PSEUDO: 底部功能面板（開始/紀錄/結算按鈕區） */
#functionPanel {
  position: fixed; bottom: 95px;
  left: 50%; transform: translateX(-50%);
  width: 85%; max-width: 400px;
  background: var(--white); border-radius: 24px; padding: 20px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.08);
  z-index: 1500; text-align: center;
}

/* PSEUDO: 路線清單卡片樣式 */
#recordsContainer { width: 92%; max-width: 450px; margin: 0 auto; }
.record-card {
  background: var(--white); margin: 15px 0; padding: 22px;
  border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);
  position: relative; border-left: 6px solid var(--accent-positive);
  cursor: pointer; display: block; box-sizing: border-box; text-align: left;
}
.record-card.is-pinned { border-left-color: var(--accent-pin); background: #FFFDF5; }
.pin-icon { position: absolute; top: 18px; right: 18px; cursor: pointer; font-size: 22px; opacity: 0.3; }
.delete-btn { position: absolute; bottom: 18px; right: 18px; cursor: pointer; font-size: 18px; opacity: 0.3; }

/* PSEUDO: 底部導覽列 */
#navBar {
  position: fixed; bottom: 0; width: 100%; height: 75px;
  background: var(--white); display: flex;
  border-top: 1px solid var(--border-light);
  z-index: 2000; padding-bottom: env(safe-area-inset-bottom);
}
.nav-item {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  font-size: 11px; color: var(--text-soft); cursor: pointer;
}
.nav-item.active { color: var(--text-main); font-weight: bold; }

/* PSEUDO: 共用按鈕樣式 */
.btn-base {
  padding: 16px 24px; font-size: 15px; font-weight: bold;
  border: none; border-radius: 14px; cursor: pointer; width: 100%; outline: none;
}
.btn-main { background: var(--text-main); color: var(--white); }
.btn-event { background: var(--accent-positive); color: var(--white); }

/* PSEUDO: Modal 共用樣式
   z-index 9999 確保蓋過地圖所有圖層 */
#eventModal, #saveModal, #memoryBox {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.5);
  display: none; align-items: center; justify-content: center;
  z-index: 9999;
}
.modal-content {
  background: var(--white); width: 90%; max-width: 380px;
  border-radius: 28px; padding: 25px; box-sizing: border-box;
}
.icon-selector { display: flex; justify-content: space-around; margin: 15px 0; font-size: 28px; }
.icon-item { cursor: pointer; padding: 8px; border-radius: 12px; border: 2px solid transparent; }
.icon-item.selected { background: var(--bg-warm); border-color: var(--accent-positive); }

/* PSEUDO: 事件輸入框上方的地標偵測結果 */
#nearbyBadge { font-size: 12px; color: var(--text-soft); margin-bottom: 8px; min-height: 18px; }

/* ===================================================
   [修復 Bug 2-2] 自製事件標記的 CSS
   
   PSEUDO: 為什麼要自製標記？
   原本用 google.maps.Marker + emoji label + scale:0 的隱形 icon
   導致 Marker 的實際 hitbox（可點擊範圍）幾乎是 0
   手指點 emoji，觸控事件根本沒被捕捉
   
   解法：改用 OverlayView，把真實 HTML <div> 放到地圖圖層
   這樣點擊範圍就是 emoji 的真實視覺大小，完全可靠
   =================================================== */
.event-marker-div {
  position: absolute;
  font-size: 28px;
  cursor: pointer;
  transform: translate(-50%, -50%); /* emoji 中心對準座標點 */
  user-select: none;
  -webkit-user-select: none;
  pointer-events: auto; /* 讓觸控事件可以被這個元素捕捉 */
  z-index: 999;
}
</style>

<!-- ===================================================
     PSEUDO: Firebase 模組初始化
     使用 ES Module（type="module"）載入 Firebase SDK
     初始化後把 db 和 API 函式掛到 window
     讓下方傳統 <script> 也能呼叫
     =================================================== -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, updateDoc, deleteDoc, doc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDc460QtdfTv32gEPNPLVCMOxPz0hCWxbQ",
  authDomain: "city-walk-project.firebaseapp.com",
  projectId: "city-walk-project",
  storageBucket: "city-walk-project.firebasestorage.app",
  messagingSenderId: "190868537611",
  appId: "1:190868537611:web:9a97031a9357f4d39be20e"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
window.db = db;
window.api = { addDoc, getDocs, updateDoc, deleteDoc, doc, collection, serverTimestamp };
</script>
</head>
<body>

<div id="statusBar">City Walker</div>

<div class="map-controls">
  <button class="map-btn" onclick="focusOnMe()">📍</button>
  <button class="map-btn hidden" id="btnFocusRoute" onclick="focusOnRouteStart()">🛣️</button>
</div>

<!-- ===================================================
     PSEUDO: 回憶彈窗
     點擊地圖上的事件 emoji 後出現
     點擊背景可關閉（onclick="closeMemoryBox()"）
     內容區用 stopPropagation 阻止關閉
     =================================================== -->
<div id="memoryBox" onclick="closeMemoryBox()">
  <div class="modal-content" onclick="event.stopPropagation()" style="text-align:center;">
    <div id="memoryIcon" style="font-size:50px; margin-bottom:15px;">📸</div>
    <div id="memoryPlace" style="font-size:12px; color:var(--text-soft); margin-bottom:8px;"></div>
    <div id="memoryText" style="font-size:17px; color:#333; line-height:1.6; margin-bottom:25px; min-height:60px;"></div>
    <button class="btn-base btn-main" onclick="closeMemoryBox()">關閉回憶</button>
  </div>
</div>

<!-- PSEUDO: 紀錄事件彈窗 -->
<div id="eventModal">
  <div class="modal-content">
    <div style="font-weight:bold; font-size:18px; text-align:center;">紀錄這一刻</div>
    <div id="nearbyBadge">📍 偵測附近地標中...</div>
    <textarea id="eventText" placeholder="寫下心情..." maxlength="100"
      style="width:100%; height:80px; border:1px solid #EEE; padding:12px; border-radius:12px; margin:8px 0 15px; box-sizing:border-box; outline:none; resize:none;"></textarea>
    <div class="icon-selector">
      <div class="icon-item selected" onclick="selectIcon(this,'📸')">📸</div>
      <div class="icon-item" onclick="selectIcon(this,'☕')">☕</div>
      <div class="icon-item" onclick="selectIcon(this,'🌸')">🌸</div>
      <div class="icon-item" onclick="selectIcon(this,'✨')">✨</div>
      <div class="icon-item" onclick="selectIcon(this,'🍔')">🍔</div>
    </div>
    <div style="display:flex; gap:12px;">
      <button class="btn-base" style="background:#EEE;" onclick="document.getElementById('eventModal').style.display='none'">取消</button>
      <button class="btn-base btn-event" onclick="saveEvent()">確認紀錄</button>
    </div>
  </div>
</div>

<!-- PSEUDO: 保存路線彈窗 -->
<div id="saveModal">
  <div class="modal-content">
    <div style="font-weight:bold; font-size:18px; text-align:center;">保存這趟漫遊</div>
    <input type="text" id="routeName" placeholder="為這條路線命名..."
      style="width:100%; border:1px solid #EEE; padding:12px; border-radius:12px; margin:15px 0; box-sizing:border-box;">
    <div style="display:flex; gap:12px;">
      <button class="btn-base" style="background:#EEE; color:#666;" onclick="document.getElementById('saveModal').style.display='none'">取消</button>
      <button class="btn-base btn-main" id="btnConfirmSave" onclick="executeCloudSave()">確認加入</button>
    </div>
  </div>
</div>

<!-- ===================================================
     PSEUDO: 主畫面（地圖 + 功能面板）
     三個狀態區塊同時在 DOM，用 hidden 控制顯示哪個
     =================================================== -->
<div id="page-main" class="page">
  <div id="map"></div>
  <div id="functionPanel">
    <!-- 狀態一：未開始 -->
    <div id="state-init">
      <button class="btn-base btn-main" onclick="startWalk()">開始 City Walk！</button>
    </div>
    <!-- 狀態二：走路中 -->
    <div id="state-recording" class="hidden">
      <button class="btn-base btn-event" onclick="openEventCanvas()">紀錄事件！</button>
      <button class="btn-base" style="background:#f5f5f5; color:#666; margin-top:10px;" onclick="endWalk()">結束本次漫遊</button>
    </div>
    <!-- 狀態三：結束後 -->
    <div id="state-finished" class="hidden">
      <div id="summaryBox" style="background:#FCFAF7; border-radius:16px; padding:15px; margin-bottom:15px; text-align:left; font-size:14px; border:1px dashed var(--accent-positive);"></div>
      <button class="btn-base btn-event" onclick="openSaveModal()">加入我的路線清單</button>
      <button class="btn-base btn-main" style="margin-top:10px;" onclick="location.reload()">重新開始</button>
    </div>
  </div>
</div>

<!-- PSEUDO: 清單頁，預設隱藏 -->
<div id="page-list" class="page hidden">
  <h2 style="text-align:center; letter-spacing:2px; margin-bottom:20px;">MY JOURNEYS</h2>
  <div id="recordsContainer"></div>
</div>

<nav id="navBar">
  <div class="nav-item active" id="nav-main" onclick="switchPage('main')">📍<span>漫遊</span></div>
  <div class="nav-item" id="nav-list" onclick="switchPage('list')">📜<span>紀錄</span></div>
</nav>


<script>
/* ===================================================
   PSEUDO: 全域變數
   map / marker / pathLine → Google Maps 物件
   placesService → Places API，查詢附近地標用
   watchId → GPS 追蹤的 ID，停止時需要它
   walkPath → 走過的座標陣列
   eventsData → 紀錄的事件陣列
   historyMarkers → 舊路線的事件標記，切換時清除
   =================================================== */
let map, marker, pathLine, watchId, geocoder, placesService;
let walkPath = [], eventsData = [], totalDistance = 0;
let startTime, durationStr, cityName = "未知城市", selectedIcon = '📸';
let historyMarkers = [];


/* PSEUDO: 統一用函式關閉 memoryBox，避免直接操作 style 造成狀態混亂 */
function closeMemoryBox() {
  document.getElementById('memoryBox').style.display = 'none';
}


/* ===================================================
   PSEUDO: initMap()
   Google Maps SDK 載入完成後自動呼叫（callback=initMap）
   1. 建立地圖
   2. 建立使用者位置標記
   3. 建立路線 Polyline
   4. 建立 Geocoder（座標→城市名）
   5. 初始化 Places API
   =================================================== */
function initMap() {
  map = new google.maps.Map(document.getElementById("map"), {
    zoom: 17,
    center: { lat: 25.0478, lng: 121.5170 },
    disableDefaultUI: true,
    styles: [{ featureType: "poi", stylers: [{ visibility: "off" }] }]
  });

  marker = new google.maps.Marker({
    map,
    label: { text: "👣", fontSize: "30px" },
    icon: { path: google.maps.SymbolPath.CIRCLE, scale: 0 },
    zIndex: 999
  });

  pathLine = new google.maps.Polyline({
    map, strokeColor: "#333", strokeWeight: 6, strokeOpacity: 0.4
  });

  geocoder = new google.maps.Geocoder();

  /* PSEUDO: PlacesService 需要傳入 map 物件初始化
     必須搭配 script &libraries=places 才有 google.maps.places */
  placesService = new google.maps.places.PlacesService(map);
}


/* ===================================================
   [修復 Bug 2-2] createEventMarker()

   PSEUDO: 改用 OverlayView 取代 google.maps.Marker

   問題：Marker + emoji label + scale:0 隱形 icon
         → 實際 hitbox 幾乎是 0，手機觸控抓不到

   解法：OverlayView 把真實 HTML <div> 放入地圖圖層
         → 點擊範圍等於 emoji 的真實視覺大小

   OverlayView 三個必要方法：
   - onAdd()  → 把 DOM 插入地圖圖層（只執行一次）
   - draw()   → 每次地圖重繪時，把 DOM 對準地理座標
   - onRemove() → 清除 DOM（路線切換時用）
   =================================================== */
function createEventMarker(pos, icon, text, placeName) {

  /* PSEUDO: 定義自訂圖層 class，繼承 OverlayView */
  function EmojiOverlay(position, icon, text, placeName) {
    this.position_ = new google.maps.LatLng(position.lat, position.lng);
    this.icon_ = icon;
    this.text_ = text;
    this.placeName_ = placeName || '';
    this.div_ = null;
    this.setMap(map); /* 告訴地圖這個 overlay 屬於哪個地圖實例 */
  }

  EmojiOverlay.prototype = Object.create(google.maps.OverlayView.prototype);

  /* PSEUDO: onAdd - overlay 加入地圖時建立 DOM 元素
     overlayMouseTarget 圖層專門處理互動事件，最適合可點擊元素 */
  EmojiOverlay.prototype.onAdd = function() {
    var div = document.createElement('div');
    div.className = 'event-marker-div';
    div.innerText = this.icon_;

    /* PSEUDO: 用 closure 把資料鎖在事件函式裡，確保點擊時資料正確 */
    var capturedIcon = this.icon_;
    var capturedText = this.text_;
    var capturedPlace = this.placeName_;

    function showMemory(e) {
      /* PSEUDO: 阻止事件傳播到地圖底層，防止地圖也接到這個點擊 */
      e.stopPropagation();
      if (e.preventDefault) e.preventDefault();

      document.getElementById('memoryIcon').innerText = capturedIcon || '📸';
      document.getElementById('memoryText').innerText = capturedText || '那一天，在這裡留下了足跡...';
      document.getElementById('memoryPlace').innerText = capturedPlace ? ('📍 ' + capturedPlace) : '';
      document.getElementById('memoryBox').style.display = 'flex';
    }

    /* PSEUDO: 同時綁定 click（桌機）和 touchstart（手機） */
    div.addEventListener('click', showMemory);
    div.addEventListener('touchstart', showMemory, { passive: false });

    this.div_ = div;
    this.getPanes().overlayMouseTarget.appendChild(div);
  };

  /* PSEUDO: draw - 把 div 的像素位置對準地理座標
     每次地圖縮放或平移後都會重新執行 */
  EmojiOverlay.prototype.draw = function() {
    var point = this.getProjection().fromLatLngToDivPixel(this.position_);
    if (this.div_ && point) {
      this.div_.style.left = point.x + 'px';
      this.div_.style.top  = point.y + 'px';
    }
  };

  /* PSEUDO: onRemove - 從 DOM 移除這個標記 */
  EmojiOverlay.prototype.onRemove = function() {
    if (this.div_) {
      this.div_.parentNode.removeChild(this.div_);
      this.div_ = null;
    }
  };

  return new EmojiOverlay(pos, icon, text, placeName);
}


/* PSEUDO: 地圖平移回使用者目前位置 */
function focusOnMe() {
  if (marker && marker.getPosition()) map.panTo(marker.getPosition());
}

/* PSEUDO: 地圖平移到舊路線的起點 */
function focusOnRouteStart() {
  var p = pathLine.getPath().getArray();
  if (p.length > 0) map.panTo(p[0]);
}


/* ===================================================
   PSEUDO: startWalk()
   開始 City Walk
   1. 記錄開始時間，切換 UI 狀態
   2. 啟動 GPS 持續追蹤
   3. 每次收到新座標，通過三道過濾才記錄
   =================================================== */
function startWalk() {
  startTime = new Date();
  document.getElementById('state-init').classList.add('hidden');
  document.getElementById('state-recording').classList.remove('hidden');

  watchId = navigator.geolocation.watchPosition(function(pos) {
    var newPoint = { lat: pos.coords.latitude, lng: pos.coords.longitude };
    var accuracy = pos.coords.accuracy;

    /* -----------------------------------------------
       [修復 Bug 2-1] GPS 漂移三道過濾
       ----------------------------------------------- */

    /* 防線一：精度過濾
       PSEUDO: accuracy > 40m → GPS 訊號太差，這點不可信，丟掉 */
    if (accuracy > 40) return;

    if (walkPath.length > 0) {
      var last = walkPath[walkPath.length - 1];
      var dist = google.maps.geometry.spherical.computeDistanceBetween(
        new google.maps.LatLng(last.lat, last.lng),
        new google.maps.LatLng(newPoint.lat, newPoint.lng)
      );

      /* 防線二：靜止漂移
         PSEUDO: 距離 < 3m → 人沒動，是 GPS 自己在漂，丟掉 */
      if (dist < 3) return;

      /* 防線三：跳點
         PSEUDO: 距離 > 80m → 不可能幾秒內移動這麼遠，是跳點，丟掉 */
      if (dist > 80) return;
    }

    /* PSEUDO: 通過三道過濾，正式記錄這個座標 */
    walkPath.push(newPoint);
    pathLine.setPath(walkPath);
    marker.setPosition(newPoint);
    map.panTo(newPoint);

  }, function(err) {
    console.error('[GPS錯誤]', err);
  }, {
    enableHighAccuracy: true, /* 強制 GPS，不用基地台/WiFi */
    maximumAge: 0,            /* 不接受快取位置 */
    timeout: 10000
  });
}


/* ===================================================
   [修復 Bug 2-3] openEventCanvas()

   PSEUDO: 開啟事件視窗時，查詢附近地標（NearbySearch）

   問題根源：原本 script 只載入 &libraries=geometry
   google.maps.places 完全不存在，NearbySearch 直接報錯

   修法：改為 &libraries=places,geometry（見 script src）
   =================================================== */
function openEventCanvas() {
  document.getElementById('eventModal').style.display = 'flex';
  document.getElementById('nearbyBadge').innerText = '📍 偵測附近地標中...';
  window._nearbyPlaceName = '';

  var currentPos = marker.getPosition();
  if (!currentPos || !placesService) {
    document.getElementById('nearbyBadge').innerText = '（無法取得位置）';
    return;
  }

  /* PSEUDO: 搜尋半徑 50m 內的 establishment（商店/景點）
     取前三個地標名稱顯示，並儲存第一個供事件存檔用 */
  placesService.nearbySearch({
    location: currentPos,
    radius: 50,
    type: ['establishment']
  }, function(results, status) {
    if (status === google.maps.places.PlacesServiceStatus.OK && results.length > 0) {
      var names = results.slice(0, 3).map(function(p) { return p.name; });
      document.getElementById('nearbyBadge').innerText = '📍 ' + names.join(' / ');
      window._nearbyPlaceName = names[0];
    } else {
      document.getElementById('nearbyBadge').innerText = '（附近無地標）';
    }
  });
}


/* ===================================================
   PSEUDO: saveEvent()
   確認紀錄事件
   1. 讀取文字、目前座標、地標名
   2. 加入 eventsData 陣列
   3. 在地圖放 OverlayView 標記
   4. 清空輸入，關閉 modal
   =================================================== */
function saveEvent() {
  var text = document.getElementById('eventText').value;
  var pos = marker.getPosition().toJSON();
  var placeName = window._nearbyPlaceName || '';

  eventsData.push({ text: text, icon: selectedIcon, pos: pos, placeName: placeName });
  createEventMarker(pos, selectedIcon, text, placeName);

  document.getElementById('eventText').value = '';
  window._nearbyPlaceName = '';
  document.getElementById('eventModal').style.display = 'none';
}


/* ===================================================
   PSEUDO: endWalk()
   結束漫遊
   1. 停止 GPS 追蹤
   2. 計算總里程（Polyline 長度）和時長
   3. 用 Geocoder 把最後座標轉成城市名
   4. 顯示結算畫面
   =================================================== */
function endWalk() {
  navigator.geolocation.clearWatch(watchId);
  document.getElementById('state-recording').classList.add('hidden');
  document.getElementById('state-finished').classList.remove('hidden');

  totalDistance = google.maps.geometry.spherical.computeLength(pathLine.getPath()) / 1000;
  durationStr = Math.floor(Math.abs(new Date() - startTime) / 60000) + " 分鐘";

  if (walkPath.length > 0) {
    geocoder.geocode({ location: walkPath[walkPath.length - 1] }, function(results, status) {
      if (status === "OK" && results[0]) {
        var cityObj = results[0].address_components.find(function(c) {
          return c.types.includes("administrative_area_level_1") || c.types.includes("locality");
        });
        cityName = cityObj ? cityObj.long_name : "未知城市";
        document.getElementById('summaryBox').innerHTML =
          '<strong>漫遊結算</strong><br>' +
          '🏙️ 城市：' + cityName + '<br>' +
          '👣 里程：' + totalDistance.toFixed(2) + ' KM<br>' +
          '⏱️ 時長：' + durationStr + '<br>' +
          '📸 事件：' + eventsData.length + ' 個';
      }
    });
  }
}


/* ===================================================
   PSEUDO: executeCloudSave()
   把路線資料存到 Firebase Firestore
   events 陣列現在包含 placeName 欄位
   存完後 reload 頁面
   =================================================== */
async function executeCloudSave() {
  var btn = document.getElementById('btnConfirmSave');
  if (btn) btn.disabled = true; /* 防止重複點擊 */
  try {
    await window.api.addDoc(window.api.collection(window.db, "walk_records"), {
      name: document.getElementById('routeName').value || "未命名漫遊",
      city: cityName,
      distance: totalDistance,
      duration: durationStr,
      path: walkPath,
      events: eventsData,
      isPinned: false,
      createdAt: window.api.serverTimestamp()
    });
    location.reload();
  } catch (e) {
    alert("儲存失敗");
    if (btn) btn.disabled = false;
  }
}


/* ===================================================
   PSEUDO: fetchRecords()
   從 Firebase 讀取所有路線，渲染成卡片清單
   排序：isPinned 的排前面，其次依 createdAt 倒序
   =================================================== */
async function fetchRecords() {
  var container = document.getElementById('recordsContainer');
  if (!container) return;
  container.innerHTML = '<p style="text-align:center; padding:20px;">載入中...</p>';
  try {
    var snap = await window.api.getDocs(window.api.collection(window.db, "walk_records"));
    window.currentDocs = [];
    snap.forEach(function(d) { window.currentDocs.push(Object.assign({ id: d.id }, d.data())); });

    window.currentDocs.sort(function(a, b) {
      return (b.isPinned - a.isPinned) || ((b.createdAt && b.createdAt.seconds || 0) - (a.createdAt && a.createdAt.seconds || 0));
    });

    container.innerHTML = "";
    window.currentDocs.forEach(function(data) {
      var card = document.createElement('div');
      card.className = 'record-card ' + (data.isPinned ? 'is-pinned' : '');
      card.onclick = function() { loadSavedRoute(data.id); };
      card.innerHTML =
        '<div class="pin-icon" onclick="togglePin(event,\'' + data.id + '\',' + data.isPinned + ')">📌</div>' +
        '<div class="delete-btn" onclick="deleteRecord(event,\'' + data.id + '\')">🗑️</div>' +
        '<div style="font-size:12px;color:var(--text-soft);">' + data.city + '</div>' +
        '<div style="font-size:16px;font-weight:bold;margin:4px 0;">' + data.name + '</div>' +
        '<div style="font-size:13px;color:var(--text-soft);">👣 ' + data.distance.toFixed(2) + ' km &nbsp;⏱️ ' + data.duration + '</div>';
      container.appendChild(card);
    });
  } catch (e) {
    console.error(e);
    container.innerHTML = '<p style="text-align:center;color:red;">載入失敗</p>';
  }
}


/* ===================================================
   PSEUDO: loadSavedRoute()
   點擊卡片，把舊路線載入地圖
   1. 切換到主畫面
   2. 清除目前路線和事件標記
   3. 重繪舊路線（橘色）
   4. 重建舊事件標記（OverlayView，含 placeName）
   5. 地圖移到路線起點
   =================================================== */
function loadSavedRoute(id) {
  var data = window.currentDocs.find(function(d) { return d.id === id; });
  if (!data) return;

  switchPage('main');
  pathLine.setPath([]);

  /* PSEUDO: setMap(null) 讓 OverlayView 自行觸發 onRemove 清除 DOM */
  historyMarkers.forEach(function(m) { m.setMap(null); });
  historyMarkers = [];

  var pts = data.path.map(function(p) { return { lat: p.lat, lng: p.lng }; });
  pathLine.setPath(pts);
  pathLine.setOptions({ strokeColor: "#FEAD89", strokeOpacity: 0.8, strokeWeight: 8 });

  if (data.events) {
    data.events.forEach(function(ev) {
      var m = createEventMarker(ev.pos, ev.icon, ev.text, ev.placeName || '');
      historyMarkers.push(m);
    });
  }

  map.panTo(pts[0]);
  document.getElementById('btnFocusRoute').classList.remove('hidden');
}


/* PSEUDO: 刪除路線，stopPropagation 防止觸發卡片 onclick */
async function deleteRecord(e, id) {
  e.stopPropagation();
  if (!confirm("確定要刪除嗎？")) return;
  await window.api.deleteDoc(window.api.doc(window.db, "walk_records", id));
  fetchRecords();
}

/* PSEUDO: 切換釘選狀態，操作完後重新載入清單 */
async function togglePin(e, id, status) {
  e.stopPropagation();
  await window.api.updateDoc(window.api.doc(window.db, "walk_records", id), { isPinned: !status });
  fetchRecords();
}


/* ===================================================
   PSEUDO: switchPage()
   切換主畫面（漫遊）和清單頁
   - 先全部隱藏，再顯示目標頁
   - 切到清單頁時自動讀取 Firebase 資料
   =================================================== */
function switchPage(p) {
  document.querySelectorAll('.page').forEach(function(page) { page.classList.add('hidden'); });
  document.querySelectorAll('.nav-item').forEach(function(n) { n.classList.remove('active'); });
  var targetPage = document.getElementById('page-' + p);
  var targetNav  = document.getElementById('nav-' + p);
  if (targetPage) targetPage.classList.remove('hidden');
  if (targetNav)  targetNav.classList.add('active');
  if (p === 'list') fetchRecords();
}

/* PSEUDO: 切換選中的事件 emoji，視覺高亮 */
function selectIcon(el, icon) {
  document.querySelectorAll('.icon-item').forEach(function(i) { i.classList.remove('selected'); });
  el.classList.add('selected');
  selectedIcon = icon;
}

function openSaveModal() { document.getElementById('saveModal').style.display = 'flex'; }


/* ===================================================
   PSEUDO: 把所有函式掛到 window
   HTML 的 onclick 屬性只能呼叫 window 上的函式
   這個 <script> 不是 module，函式預設就在 window，
   但明確掛上去讓架構更清晰，也方便未來拆檔
   =================================================== */
window.onload = initMap;
window.focusOnMe = focusOnMe;
window.focusOnRouteStart = focusOnRouteStart;
window.openEventCanvas = openEventCanvas;
window.saveEvent = saveEvent;
window.selectIcon = selectIcon;
window.openSaveModal = openSaveModal;
window.executeCloudSave = executeCloudSave;
window.switchPage = switchPage;
window.closeMemoryBox = closeMemoryBox;
window.deleteRecord = deleteRecord;
window.togglePin = togglePin;
</script>

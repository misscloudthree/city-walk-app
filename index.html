<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>City Walker - v1.0.8.5</title>
    <link href="https://fonts.googleapis.com/css2?family=Poly&display=swap" rel="stylesheet">
    <style>
        :root { --bg-warm: #F9F7F2; --text-main: #333333; --text-soft: #7D7D7D; --accent-positive: #8FB9A8; --accent-warm: #FEAD89; --border-light: #EEEEEE; --white: #FFFFFF; --accent-pin: #FFD700; }
        body { margin: 0; padding: 0; font-family: 'Poly', 'Microsoft JhengHei', sans-serif; background: var(--bg-warm); color: var(--text-main); overflow: hidden; width: 100vw; height: 100vh; }
        .hidden { display: none !important; visibility: hidden; pointer-events: none; }
        
        /* 頁面層級加固：確保隱藏的頁面不會擋住點擊 */
        .page { height: 100vh; width: 100%; position: absolute; top: 0; left: 0; overflow-y: auto; padding-bottom: 120px; box-sizing: border-box; }
        #page-main { z-index: 10; }
        #page-list { z-index: 20; background: var(--bg-warm); padding-top: 60px; }

        #statusBar { position: fixed; top: 0; width: 100%; height: 50px; display: flex; align-items: center; justify-content: center; font-size: 13px; background: rgba(249, 247, 242, 0.9); backdrop-filter: blur(5px); z-index: 1000; border-bottom: 1px solid var(--border-light); pointer-events: none; }
        #map { height: 100vh; width: 100%; background: #e5e3df; position: relative; z-index: 5; }
        
        /* 按鈕組：確保 z-index 高於地圖但低於彈窗 */
        .map-controls { position: fixed; right: 20px; bottom: 210px; display: flex; flex-direction: column; gap: 12px; z-index: 100; }
        .map-btn { width: 50px; height: 50px; background: var(--white); border-radius: 50%; box-shadow: 0 4px 15px rgba(0,0,0,0.1); display: flex; align-items: center; justify-content: center; font-size: 22px; cursor: pointer; border: none; }

        #functionPanel { position: fixed; bottom: 95px; left: 50%; transform: translateX(-50%); width: 85%; max-width: 400px; background: var(--white); border-radius: 24px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); z-index: 100; text-align: center; }

        /* 卡片視覺保持穩定 */
        #recordsContainer { width: 92%; max-width: 450px; margin: 0 auto; }
        .record-card { background: var(--white); margin: 15px 0; padding: 22px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); position: relative; border-left: 6px solid var(--accent-positive); cursor: pointer; display: block; }
        
        #navBar { position: fixed; bottom: 0; width: 100%; height: 75px; background: var(--white); display: flex; border-top: 1px solid var(--border-light); z-index: 1000; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 11px; color: var(--text-soft); cursor: pointer; }
        .nav-item.active { color: var(--text-main); font-weight: bold; }

        /* Modal 確保在最頂層 */
        #eventModal, #saveModal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 5000; }
    </style>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, updateDoc, deleteDoc, doc, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDc460QtdfTv32gEPNPLVCMOxPz0hCWxbQ",
            authDomain: "city-walk-project.firebaseapp.com",
            projectId: "city-walk-project",
            storageBucket: "city-walk-project.firebasestorage.app",
            messagingSenderId: "190868537611",
            appId: "1:190868537611:web:9a97031a9357f4d39be20e"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        window.db = db;
        window.api = { addDoc, getDocs, updateDoc, deleteDoc, doc, collection, query, orderBy, serverTimestamp };
    </script>
</head>
<body>

    <div id="statusBar">City Walker</div>

    <div class="map-controls">
        <button class="map-btn" onclick="focusOnMe()">📍</button>
        <button class="map-btn hidden" id="btnFocusRoute" onclick="focusOnRouteStart()">🛣️</button>
    </div>

    <div id="page-main" class="page">
        <div id="map"></div>
        <div id="functionPanel">
            <div id="state-init">
                <button class="btn-base btn-main" style="padding:16px; background:#333; color:#fff; border-radius:12px; width:100%; border:none; font-weight:bold;" onclick="startWalk()">開始 City Walk ！</button>
            </div>
            <div id="state-recording" class="hidden">
                <button class="btn-base" style="padding:16px; background:var(--accent-positive); color:#fff; border-radius:12px; width:100%; border:none; font-weight:bold;" onclick="openEventCanvas()">紀錄事件！</button>
                <button class="btn-base" style="background:#f5f5f5; color:#666; margin-top:10px; border:none; padding:10px; width:100%; border-radius:12px;" onclick="endWalk()">結束本次漫遊</button>
            </div>
            <div id="state-finished" class="hidden">
                <div id="summaryBox" style="background: #FCFAF7; border-radius: 16px; padding: 15px; margin-bottom: 15px; text-align: left; font-size: 14px; border: 1px dashed var(--accent-positive);"></div>
                <button class="btn-base" style="padding:16px; background:var(--accent-positive); color:#fff; border-radius:12px; width:100%; border:none; font-weight:bold;" onclick="openSaveModal()">加入我的路線清單</button>
                <button class="btn-base" style="margin-top:10px; padding:10px; width:100%; border:none; background:#333; color:#fff; border-radius:12px;" onclick="location.reload()">重新開始</button>
            </div>
        </div>
    </div>

    <div id="page-list" class="page hidden">
        <h2 style="text-align: center; letter-spacing: 2px; margin-bottom:20px;">MY JOURNEYS</h2>
        <div id="recordsContainer"></div>
    </div>

    <nav id="navBar">
        <div class="nav-item active" id="nav-main" onclick="switchPage('main')">📍<span>漫遊</span></div>
        <div class="nav-item" id="nav-list" onclick="switchPage('list')">📜<span>紀錄</span></div>
    </nav>

    <div id="eventModal">
        <div class="modal-content">
            <textarea id="eventText" placeholder="寫下心情..." style="width:100%; height:80px; margin-bottom:15px;"></textarea>
            <div class="icon-selector">
                <div class="icon-item selected" onclick="selectIcon(this, '📸')">📸</div>
                <div class="icon-item" onclick="selectIcon(this, '☕')">☕</div>
                <div class="icon-item" onclick="selectIcon(this, '🌸')">🌸</div>
            </div>
            <button class="btn-base" style="width:100%; background:var(--accent-positive); color:white; padding:12px; border:none; border-radius:12px;" onclick="saveEvent()">確認紀錄</button>
            <button onclick="document.getElementById('eventModal').style.display='none'" style="width:100%; margin-top:10px; background:none; border:none; color:#999;">取消</button>
        </div>
    </div>

    <div id="saveModal">
        <div class="modal-content">
            <input type="text" id="routeName" placeholder="為路線命名..." style="width:100%; padding:12px; margin-bottom:15px; border:1px solid #eee; border-radius:8px;">
            <button class="btn-base" id="btnConfirmSave" style="width:100%; background:#333; color:white; padding:12px; border:none; border-radius:12px;" onclick="executeCloudSave()">確認加入</button>
        </div>
    </div>

    <script>
        let map, marker, pathLine, watchId, geocoder, infoWindow;
        let walkPath = [], eventsData = [], totalDistance = 0, startTime, durationStr, cityName = "未知城市", selectedIcon = '📸';
        let lastMoveTime = new Date(), historyMarkers = [];

        function initMap() {
            console.log("地圖初始化中...");
            map = new google.maps.Map(document.getElementById("map"), { 
                zoom: 17, center: { lat: 25.0478, lng: 121.5170 }, 
                disableDefaultUI: true, gestureHandling: 'greedy',
                styles: [{ "featureType": "poi", "stylers": [{ "visibility": "off" }] }] 
            });
            marker = new google.maps.Marker({ map, label: { text: "👣", fontSize: "30px" }, icon: { path: google.maps.SymbolPath.CIRCLE, scale: 0 }, zIndex: 999 });
            pathLine = new google.maps.Polyline({ map, strokeColor: "#333", strokeWeight: 6, strokeOpacity: 0.4 });
            geocoder = new google.maps.Geocoder();
            infoWindow = new google.maps.InfoWindow();
        }

        // --- 強力修復：建立 Marker 與事件 ---
        function createEventMarker(pos, icon, text) {
            console.log("建立 Marker:", icon, text);
            const m = new google.maps.Marker({
                position: pos,
                map: map,
                label: { text: icon, fontSize: "28px" },
                icon: { path: google.maps.SymbolPath.CIRCLE, scale: 0 },
                zIndex: 2000, // 確保高於一切
                clickable: true
            });

            m.addListener("click", () => {
                console.log("Marker 點擊觸發成功！內容:", text);
                infoWindow.setContent(`<div style="padding:10px; color:#333; text-align:center;"><b>${icon}</b><br>${text || "漫遊回憶"}</div>`);
                infoWindow.open(map, m);
            });

            return m;
        }

        function switchPage(p) {
            console.log("切換至頁面:", p);
            document.querySelectorAll('.page').forEach(page => {
                page.classList.add('hidden');
            });
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            
            const target = document.getElementById(`page-${p}`);
            target.classList.remove('hidden');
            document.getElementById(`nav-${p}`).classList.add('active');
            
            if(p === 'list') fetchRecords();
            // 切換回地圖時強制觸發一次 resize
            if(p === 'main' && map) google.maps.event.trigger(map, 'resize');
        }

        function loadSavedRoute(id) {
            const data = window.currentDocs.find(d => d.id === id); 
            if(!data) return;
            switchPage('main');
            
            // 清理
            pathLine.setPath([]);
            historyMarkers.forEach(m => m.setMap(null));
            historyMarkers = [];

            const pts = data.path.map(p => ({lat: p.lat, lng: p.lng}));
            pathLine.setPath(pts);
            pathLine.setOptions({ strokeColor: "#FEAD89", strokeOpacity: 0.8, strokeWeight: 8 });

            if(data.events) {
                data.events.forEach(ev => {
                    const m = createEventMarker(ev.pos, ev.icon, ev.text);
                    historyMarkers.push(m);
                });
            }
            map.panTo(pts[0]);
            document.getElementById('btnFocusRoute').classList.remove('hidden');
        }

        // 基本邏輯
        function startWalk() {
            startTime = new Date(); lastMoveTime = new Date();
            document.getElementById('state-init').classList.add('hidden');
            document.getElementById('state-recording').classList.remove('hidden');
            watchId = navigator.geolocation.watchPosition((pos) => {
                const p = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                walkPath.push(p); pathLine.setPath(walkPath); marker.setPosition(p); map.panTo(p);
            }, null, { enableHighAccuracy: true });
        }
        function openEventCanvas() { document.getElementById('eventModal').style.display = 'flex'; }
        function saveEvent() {
            const text = document.getElementById('eventText').value;
            const pos = marker.getPosition().toJSON();
            eventsData.push({ text, icon: selectedIcon, pos });
            createEventMarker(pos, selectedIcon, text);
            document.getElementById('eventModal').style.display = 'none';
        }
        function endWalk() {
            navigator.geolocation.clearWatch(watchId);
            document.getElementById('state-recording').classList.add('hidden');
            document.getElementById('state-finished').classList.remove('hidden');
            totalDistance = google.maps.geometry.spherical.computeLength(pathLine.getPath()) / 1000;
            geocoder.geocode({ location: walkPath[walkPath.length-1] }, (results) => {
                cityName = results[0] ? results[0].address_components[2].long_name : "未知城市";
                document.getElementById('summaryBox').innerHTML = `👣 里程：${totalDistance.toFixed(2)} km<br>📸 事件：${eventsData.length}`;
            });
        }
        async function executeCloudSave() {
            await window.api.addDoc(window.api.collection(window.db, "walk_records"), { name: document.getElementById('routeName').value || "漫遊", city: cityName, distance: totalDistance, path: walkPath, events: eventsData, isPinned: false, createdAt: window.api.serverTimestamp() });
            location.reload();
        }
        async function fetchRecords() {
            const snap = await window.api.getDocs(window.api.collection(window.db, "walk_records"));
            window.currentDocs = [];
            snap.forEach(d => window.currentDocs.push({ id: d.id, ...d.data() }));
            const container = document.getElementById('recordsContainer');
            container.innerHTML = "";
            window.currentDocs.forEach(data => {
                const card = document.createElement('div');
                card.className = "record-card";
                card.onclick = () => loadSavedRoute(data.id);
                card.innerHTML = `<b>${data.name}</b><br><small>${data.city} | ${data.distance.toFixed(2)} km</small>`;
                container.appendChild(card);
            });
        }
        function selectIcon(el, icon) { selectedIcon = icon; }
        function openSaveModal() { document.getElementById('saveModal').style.display = 'flex'; }
        function focusOnMe() { map.panTo(marker.getPosition()); }
        function focusOnRouteStart() { map.panTo(pathLine.getPath().getAt(0)); }

        window.onload = initMap;
    </script>
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyD-7BNyEDGdFlK_-gyFlAN86r0ECjO3z40&callback=initMap&libraries=geometry" async defer></script>
</body>
</html>

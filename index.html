<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>City Walker - 隨性漫步</title>
    <link href="https://fonts.googleapis.com/css2?family=Poly&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-warm: #F9F7F2;
            --text-main: #333333;
            --text-soft: #7D7D7D;
            --accent-positive: #8FB9A8;
            --accent-warm: #FEAD89;
            --border-light: #EEEEEE;
            --white: #FFFFFF;
        }

        body { 
            margin: 0; padding: 0;
            font-family: 'Poly', 'Microsoft JhengHei', sans-serif; 
            background: var(--bg-warm); 
            color: var(--text-main);
            overflow: hidden; 
        }

        /* 頂部狀態列 */
        #statusBar {
            position: fixed;
            top: 0; width: 100%; height: 50px;
            display: flex; align-items: center; justify-content: center;
            font-size: 13px; letter-spacing: 1.5px;
            background: rgba(249, 247, 242, 0.9);
            backdrop-filter: blur(5px);
            z-index: 1000;
        }
        .status-searching { color: var(--text-soft); }
        .status-walking { color: var(--accent-positive); }
        .status-pausing { color: var(--accent-warm); }

        /* 地圖區域 */
        #map { height: 100vh; width: 100%; z-index: 1; background: #e5e3df; }

        /* Google Maps InfoWindow 樣式優化：隱藏叉叉 */
        .gm-ui-hover-effect { display: none !important; }
        .gm-style-iw-c { border-radius: 12px !important; padding: 10px !important; box-shadow: 0 4px 15px rgba(0,0,0,0.1) !important; }
        .gm-style-iw-d { overflow: hidden !important; }

        /* 功能區塊 */
        #functionPanel {
            position: fixed;
            bottom: 90px;
            left: 50%; transform: translateX(-50%);
            width: 85%; max-width: 400px;
            background: var(--white);
            border-radius: 24px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            z-index: 500;
            text-align: center;
        }

        .btn-base {
            padding: 16px 24px; font-size: 15px; font-weight: bold;
            border: none; border-radius: 14px; cursor: pointer;
            transition: 0.3s; width: 100%; margin: 6px 0;
            outline: none;
        }
        .btn-main { background: var(--text-main); color: var(--white); }
        .btn-event { background: var(--accent-positive); color: var(--white); }
        
        .btn-plus { 
            width: 56px; height: 56px; border-radius: 50%; 
            font-size: 24px; background: var(--white); 
            border: 2px solid var(--text-main); color: var(--text-main);
            display: inline-flex; align-items: center; justify-content: center;
            margin-bottom: 10px;
        }

        /* 底部導覽列 */
        #navBar {
            position: fixed;
            bottom: 0; width: 100%; height: 75px;
            background: var(--white);
            display: flex; border-top: 1px solid var(--border-light);
            z-index: 1000;
            padding-bottom: env(safe-area-inset-bottom);
        }
        .nav-item {
            flex: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            font-size: 11px; color: var(--text-soft);
            cursor: pointer;
        }
        .nav-item.active { color: var(--text-main); font-weight: bold; }
        .nav-icon { font-size: 22px; margin-bottom: 4px; }

        #summaryBox { display: none; margin-top: 15px; text-align: left; font-size: 14px; border-top: 1px solid var(--border-light); padding-top: 15px; line-height: 1.8; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="statusBar" class="status-searching">等待開啟 City Walk...</div>

    <div id="page-main">
        <div id="map"></div>
        <div id="functionPanel">
            <div id="state-init">
                <button class="btn-base btn-main" onclick="startWalk()">開始 City Walk！</button>
            </div>
            <div id="state-recording" class="hidden">
                <button class="btn-base btn-event" onclick="openEventCanvas()">紀錄事件！</button>
                <button class="btn-base" style="background:#f5f5f5; color:#666;" onclick="endWalk()">結束本次漫遊</button>
            </div>
            <div id="state-finished" class="hidden">
                <button id="btnCreateList" class="btn-plus" onclick="confirmSave()">+</button>
                <div id="summaryBox"></div>
                <button class="btn-base btn-main" style="margin-top:15px;" onclick="location.reload()">開始新路線</button>
            </div>
        </div>
    </div>

    <div id="page-query" class="hidden" style="padding:100px 20px; text-align:center;">
        <h3>City Routes Query</h3>
        <p>探索別人的漫遊路線 (開發中)</p>
    </div>
    <div id="page-list" class="hidden" style="padding:100px 20px; text-align:center;">
        <h3>My Lists</h3>
        <p>您的專屬漫遊紀錄 (開發中)</p>
    </div>

    <nav id="navBar">
        <div class="nav-item active" onclick="switchPage('main')">
            <span class="nav-icon">📍</span><span>漫遊</span>
        </div>
        <div class="nav-item" onclick="switchPage('query')">
            <span class="nav-icon">🌍</span><span>發現</span>
        </div>
        <div class="nav-item" onclick="switchPage('list')">
            <span class="nav-icon">📜</span><span>紀錄</span>
        </div>
    </nav>

    <script>
        let map, marker, pathLine, watchId, infoWindow;
        let walkCoordinates = [];
        let isTracking = false;
        let lastPos = null;
        let lastMoveTime = new Date();

        function switchPage(pageId) {
            document.querySelectorAll('[id^="page-"]').forEach(p => p.classList.add('hidden'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(`page-${pageId}`).classList.remove('hidden');
            if(event) event.currentTarget.classList.add('active');
        }

        // 初始化地圖
        function initMap() {
            const indieStyle = [
                { "featureType": "all", "elementType": "labels.text.fill", "stylers": [{ "color": "#7c7c7c" }] },
                { "featureType": "landscape", "stylers": [{ "color": "#f1eee8" }] },
                { "featureType": "poi", "stylers": [{ "visibility": "off" }] },
                { "featureType": "transit", "stylers": [{ "visibility": "off" }] },
                { "featureType": "poi.food_and_drink", "stylers": [{ "visibility": "on" }] }
            ];

            map = new google.maps.Map(document.getElementById("map"), {
                zoom: 17,
                center: { lat: 25.0478, lng: 121.5170 },
                disableDefaultUI: true,
                styles: indieStyle
            });

            marker = new google.maps.Marker({ 
                map: map, 
                label: { text: "👣", fontSize: "24px" },
                icon: { path: google.maps.SymbolPath.CIRCLE, scale: 0 },
                zIndex: 999 
            });

            pathLine = new google.maps.Polyline({ 
                map: map, 
                strokeColor: "#333", 
                strokeWeight: 5, 
                strokeOpacity: 0.4 
            });

            infoWindow = new google.maps.InfoWindow({
                content: '<div style="color:#8FB9A8; font-weight:bold; font-family:sans-serif; padding:2px 5px;">I’m Here! ✨</div>'
            });

            // 點擊腳印顯示
            marker.addListener("click", () => {
                infoWindow.open(map, marker);
            });

            // 點擊地圖任何地方隱藏 InfoWindow
            map.addListener("click", () => {
                infoWindow.close();
            });
        }

        function startWalk() {
            if (!navigator.geolocation) { alert("瀏覽器不支援定位"); return; }
            isTracking = true;
            document.getElementById('state-init').classList.add('hidden');
            document.getElementById('state-recording').classList.remove('hidden');
            updateStatus("取得定位狀態中", "searching");
            
            watchId = navigator.geolocation.watchPosition(updatePosition, (err) => {
                updateStatus("請確認定位狀態", "searching");
            }, { enableHighAccuracy: true });
        }

        function updatePosition(position) {
            const newPos = { lat: position.coords.latitude, lng: position.coords.longitude };
            
            // 初次定位顯示
            if (!lastPos) {
                updateStatus("已就緒，享受這片風景吧", "pausing");
                infoWindow.open(map, marker);
                // 3秒後自動關閉，或點地圖關閉
                setTimeout(() => infoWindow.close(), 3000);
            }

            // 移動判定
            if (lastPos) {
                const dist = google.maps.geometry.spherical.computeDistanceBetween(
                    new google.maps.LatLng(lastPos.lat, lastPos.lng),
                    new google.maps.LatLng(newPos.lat, newPos.lng)
                );
                if (dist > 7) {
                    updateStatus("漫步中 —", "walking");
                    lastMoveTime = new Date();
                    infoWindow.close(); // 移動時自動收起標籤
                } else if ((new Date() - lastMoveTime) / 1000 > 15) {
                    updateStatus("暫停一下...", "pausing");
                }
            }

            lastPos = newPos;
            walkCoordinates.push(newPos);
            pathLine.setPath(walkCoordinates);
            marker.setPosition(newPos);
            map.panTo(newPos);
        }

        function endWalk() {
            navigator.geolocation.clearWatch(watchId);
            isTracking = false;
            document.getElementById('state-recording').classList.add('hidden');
            document.getElementById('state-finished').classList.remove('hidden');
            document.getElementById('summaryBox').style.display = "block";
            const dist = google.maps.geometry.spherical.computeLength(pathLine.getPath()) / 1000;
            document.getElementById('summaryBox').innerHTML = `
                <div style="font-size:12px; color:#999; margin-bottom:8px;">「每一秒的漫步，都是對生活的深情告白。」</div>
                ◍ 總里程：${dist.toFixed(2)} KM
            `;
            updateStatus("記錄已暫存", "searching");
        }

        function updateStatus(text, type) {
            const el = document.getElementById('statusBar');
            el.innerText = text;
            el.className = `status-${type}`;
        }

        function openEventCanvas() { alert("下一階段：開啟事件紀錄畫布"); }
        function confirmSave() { confirm("是否存入清單？"); }
    </script>
    <script src="https://maps.googleapis.com/maps/api/js?key=Google map	AIzaSyD-7BNyEDGdFlK_-gyFlAN86r0ECjO3z40&callback=initMap&libraries=geometry,places" async defer></script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>我的可愛 City Walk</title>
    <style>
        body { margin: 0; font-family: "Segoe UI", "Apple Color Emoji", sans-serif; background: #fffaf0; }
        #map { height: 75vh; width: 100%; border-bottom: 5px solid #ffedda; }
        
        .status-bar { 
            padding: 12px; 
            text-align: center; 
            font-size: 14px; 
            color: #ff9a9e; /* 粉色字體 */
            background: #fff;
            font-weight: bold;
            letter-spacing: 2px;
        }

        .controls { 
            padding: 25px 20px; 
            text-align: center; 
            background: #fff; 
            position: relative; 
            z-index: 10; 
            border-radius: 30px 30px 0 0; 
            margin-top: -30px; 
            box-shadow: 0 -10px 20px rgba(255, 154, 158, 0.1); 
        }

        .summary { display: none; padding: 20px; background: #fff5f5; border-radius: 20px; margin-top: 15px; text-align: left; line-height: 1.8; border: 2px dashed #ffc0cb; }
        
        button { 
            padding: 16px 30px; 
            font-size: 16px; 
            cursor: pointer; 
            border: none; 
            border-radius: 50px; 
            transition: 0.3s; 
            font-weight: 800; 
            width: 100%; 
            max-width: 300px; 
            box-shadow: 0 6px 15px rgba(255, 182, 193, 0.4);
        }
        .btn-start { background: linear-gradient(120deg, #ff9a9e 0%, #fecfef 100%); color: #fff; }
        .btn-stop { background: #ff6b6b; color: #fff; }
        
        .stay-list { margin-top: 10px; color: #d4a5a5; font-style: italic; }
    </style>
</head>
<body>
    <div class="status-bar" id="statusText">今天也要可愛地散步 🌸</div>
    <div id="map"></div>
    <div class="controls">
        <button id="mainBtn" class="btn-start" onclick="toggleTracking()">開始我的 City Walk 🐾</button>
        <div id="summary" class="summary"></div>
    </div>

    <script>
        let map, marker, pathLine, watchId, service;
        let walkCoordinates = [];
        let isTracking = false;
        let startTime, lastPos, lastMoveTime;
        let detectedStores = [];

        // 可愛粉彩地圖樣式
        const cuteStyle = [
            { "featureType": "water", "elementType": "geometry", "stylers": [{ "color": "#e9eaed" }, { "lightness": 17 }] },
            { "featureType": "landscape", "elementType": "geometry", "stylers": [{ "color": "#f5f5f5" }, { "lightness": 20 }] },
            { "featureType": "road.highway", "elementType": "geometry.fill", "stylers": [{ "color": "#ffffff" }, { "lightness": 17 }] },
            { "featureType": "poi", "elementType": "geometry", "stylers": [{ "color": "#f5f5f5" }, { "lightness": 21 }] },
            { "featureType": "all", "elementType": "labels.text.stroke", "stylers": [{ "visibility": "on" }, { "color": "#ffffff" }, { "lightness": 16 }] },
            { "featureType": "all", "elementType": "labels.text.fill", "stylers": [{ "saturation": 36 }, { "color": "#333333" }, { "lightness": 40 }] },
            { "featureType": "all", "elementType": "labels.icon", "stylers": [{ "visibility": "off" }] }
        ];

        function initMap() {
            map = new google.maps.Map(document.getElementById("map"), {
                zoom: 17,
                center: { lat: 25.0478, lng: 121.5170 },
                disableDefaultUI: true,
                styles: cuteStyle // 套用可愛樣式
            });

            // 自定義可愛標記 (藍色腳印)
            marker = new google.maps.Marker({ 
                map: map, 
                label: { text: "🐾", fontSize: "24px" },
                icon: { path: google.maps.SymbolPath.CIRCLE, scale: 0 } // 隱藏原本的紅針
            });

            pathLine = new google.maps.Polyline({ 
                map: map, 
                strokeColor: "#FFB6C1", // 奶油粉紅線
                strokeWeight: 6, 
                strokeOpacity: 0.8 
            });
            service = new google.maps.places.PlacesService(map);
        }

        // ... (以下 toggleTracking, startTracking, updatePosition, stopTracking 等邏輯保持不變) ...
        // 為節省篇幅，請確保將原本 updatePosition 到最後的 script 邏輯原封不動接在後面即可
        
        function toggleTracking() {
            if (!isTracking) { startTracking(); } else { stopTracking(); }
        }

        function startTracking() {
            isTracking = true;
            startTime = new Date();
            lastMoveTime = new Date();
            walkCoordinates = [];
            detectedStores = [];
            document.getElementById("mainBtn").innerText = "結束今日份可愛散步 ✨";
            document.getElementById("mainBtn").className = "btn-stop";
            document.getElementById("statusText").innerText = "正在找尋您的足跡...";
            document.getElementById("summary").style.display = "none";
            if (navigator.geolocation) {
                watchId = navigator.geolocation.watchPosition(updatePosition, null, { enableHighAccuracy: true });
            }
        }

        function updatePosition(position) {
            const newPos = { lat: position.coords.latitude, lng: position.coords.longitude };
            const statusEl = document.getElementById("statusText");
            if (lastPos) {
                const dist = google.maps.geometry.spherical.computeDistanceBetween(
                    new google.maps.LatLng(lastPos.lat, lastPos.lng),
                    new google.maps.LatLng(newPos.lat, newPos.lng)
                );
                if (dist > 5) {
                    statusEl.innerText = "正在開心移動中 👟";
                    lastMoveTime = new Date();
                } else {
                    const idleSeconds = (new Date() - lastMoveTime) / 1000;
                    if (idleSeconds > 10) statusEl.innerText = "暫停一下，享受這美景吧 🧁";
                    if (idleSeconds > 300) findNearbyStore(newPos);
                }
            }
            lastPos = newPos;
            walkCoordinates.push(newPos);
            pathLine.setPath(walkCoordinates);
            marker.setPosition(newPos);
            map.panTo(newPos);
        }

        function findNearbyStore(pos) {
            const request = { location: pos, radius: '20', type: ['store', 'cafe', 'restaurant'] };
            service.nearbySearch(request, (results, status) => {
                if (status === google.maps.places.PlacesServiceStatus.OK && results[0]) {
                    const storeName = results[0].name;
                    if (!detectedStores.includes(storeName)) detectedStores.push(storeName);
                }
            });
        }

        function stopTracking() {
            navigator.geolocation.clearWatch(watchId);
            isTracking = false;
            document.getElementById("mainBtn").innerText = "再開始一場 City Walk 🐾";
            document.getElementById("mainBtn").className = "btn-start";
            document.getElementById("statusText").innerText = "今日份回憶已收錄";
            showFinalReport();
        }

        function showFinalReport() {
            const totalDist = google.maps.geometry.spherical.computeLength(pathLine.getPath()) / 1000;
            const duration = Math.round((new Date() - startTime) / 60000);
            const summaryBox = document.getElementById("summary");
            summaryBox.style.display = "block";
            summaryBox.innerHTML = `
                <strong>🎀 散步成果紀錄</strong><br>
                🍦 總里程：${totalDist.toFixed(2)} km<br>
                🕒 總耗時：${duration} min<br>
                🏪 踩點清單：<br>
                <div class="stay-list">${detectedStores.length > 0 ? detectedStores.join(' → ') : '漫步中，沒有特別停留'}</div>
            `;
        }
    </script>
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyD-7BNyEDGdFlK_-gyFlAN86r0ECjO3z40&callback=initMap&libraries=geometry,places" async defer></script>
</body>
</html>
